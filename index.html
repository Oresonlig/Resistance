    <title>The Chain • Mentzer 3.0</title>
    <style>
        :root { --gold: #f1c40f; --green: #2ecc71; --red: #e74c3c; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background:#111; color:#eee; max-width:560px; margin:0 auto; padding-bottom:80px; }
        header { background:#1a1a1a; padding:15px; text-align:center; border-bottom:3px solid var(--gold); }
        .user-select { display:flex; flex-wrap:wrap; gap:12px; padding:20px; justify-content:center; }
        .user-btn { background:#222; color:#eee; border:2px solid #444; padding:15px 25px; border-radius:12px; font-size:1.1rem; cursor:pointer; transition:all 0.2s; }
        .user-btn.active { border-color:var(--gold); background:#333; transform:scale(1.05); }
        .screen { display:none; padding:20px; }
        .screen.active { display:block; }
        .cycle-nav { display:flex; overflow-x:auto; gap:8px; padding:10px; background:#1a1a1a; }
        .day-btn { padding:12px 20px; background:#222; border-radius:9999px; white-space:nowrap; font-weight:600; }
        .day-btn.active { background:var(--gold); color:#111; }
        .exercise { background:#222; margin-bottom:15px; border-radius:12px; padding:15px; }
        .set-row { display:grid; grid-template-columns:1fr 1fr 1fr 80px; gap:8px; align-items:center; margin-bottom:8px; font-size:0.95rem; }
        .sync { position:fixed; bottom:20px; right:20px; padding:8px 14px; border-radius:9999px; font-size:0.8rem; display:flex; align-items:center; gap:6px; }
        button { background:var(--gold); color:#111; border:none; padding:12px 24px; border-radius:9999px; font-weight:700; cursor:pointer; }
        canvas { width:100% !important; height:220px !important; background:#1a1a1a; border-radius:12px; }
    </style>
</head>

<header>

    <!-- DATA TAB -->
