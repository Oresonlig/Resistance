function obPickUnit(unit){
  obAnswers.unit = unit;
  setTimeout(()=>showOnboarding(obUserId, 2), 180);
}
function obPickNum(n){
  obAnswers.numPasses = n;
  setTimeout(()=>showOnboarding(obUserId, 2), 60);
}
function obPickFocus(focus){
  obAnswers.focus = focus;
  setTimeout(()=>showOnboarding(obUserId, 2), 60);
}
function obPickRest(n){
  obAnswers.restCount = n;
  setTimeout(()=>showOnboarding(obUserId, 3), 60);
}
function obPickTimer(enabled){
  obAnswers.timerEnabled = enabled;
  setTimeout(()=>showOnboarding(obUserId, 3), 60);
}

function finishOnboarding(){
  const a = obAnswers;
  state.unit = a.unit || 'kg';
  state.timerEnabled = !!a.timerEnabled;
  state.timerDefault = 120;
  state.onboardingDone = true;

  const numPasses = a.numPasses || 6;
  const focus = a.focus || 'full';
  const restCount = a.restCount || 1;
  const generated = generateChain(numPasses, focus, restCount);
  state.passOrder = generated.passOrder;
  state.restSlots = generated.restSlots;

  generated.passOrder.forEach(pid=>{
    if(!BASE_PASSES.find(p=>p.id===pid)){
      const tmpl = PASS_TEMPLATES.find(t=>t.id===pid);
      if(tmpl) BASE_PASSES.push(tmpl);
    }
  });

  state.cycles = [newCycle()];
  save();
  initTheme();
  requestNotificationPermission();
  renderChain();
}

// Drag and drop for reordering (desktop + mobile touch)
let draggedId = null;
let touchDragId = null;
let touchDragEl = null;
let touchClone = null;

function dragStart(e, id){ draggedId=id; e.dataTransfer.effectAllowed='move'; }
function dragOver(e){ e.preventDefault(); e.dataTransfer.dropEffect='move'; }

// Touch drag support for mobile
function touchStart(e, id){
  touchDragId = id;
  touchDragEl = e.currentTarget;
  touchDragEl.style.opacity = '0.5';
  // Don't preventDefault here — let it fall through, longpress activates drag
  e.stopPropagation();
}
function touchMove(e){
  if(!touchDragId) return;
  e.preventDefault(); // now prevent scroll
  const touch = e.touches[0];
  const el = document.elementFromPoint(touch.clientX, touch.clientY);
  const target = el?.closest('.reorder-item');
  if(target && target.dataset.id && target.dataset.id !== touchDragId){
    // highlight drop target
    document.querySelectorAll('.reorder-item').forEach(i=>i.style.borderColor='#3a3a3a');
    target.style.borderColor = 'var(--red)';
  }
}
function touchEnd(e, id){
  if(!touchDragId){ return; }
  const touch = e.changedTouches[0];
  const el = document.elementFromPoint(touch.clientX, touch.clientY);
  const target = el?.closest('.reorder-item');
  if(touchDragEl) touchDragEl.style.opacity = '1';
  document.querySelectorAll('.reorder-item').forEach(i=>i.style.borderColor='#3a3a3a');
  if(target && target.dataset.id && target.dataset.id !== touchDragId){
    const fromId = touchDragId;
    const toId = target.dataset.id;
    const order = [...(state.passOrder||DEFAULT_PASS_ORDER)];
    const fromIdx = order.indexOf(fromId);
    const toIdx = order.indexOf(toId);
    if(fromIdx>=0 && toIdx>=0){
      order.splice(fromIdx,1);
      order.splice(toIdx,0,fromId);
      state.passOrder = order;
      const effectiveChain = getEffectiveChain();
      const panel = document.getElementById('reorder-panel');
      if(panel){
        const newContent = buildReorderUI(effectiveChain);
        const tmp = document.createElement('div');
        tmp.innerHTML = newContent;
        const newPanel = tmp.querySelector('#reorder-panel');
        if(newPanel){ newPanel.style.display='block'; panel.replaceWith(newPanel); }
      }
    }
  }
  touchDragId = null;
  touchDragEl = null;
}

function dropPass(e, targetId){
  e.preventDefault();
  if(!draggedId||draggedId===targetId)return;
  const order = [...(state.passOrder||DEFAULT_PASS_ORDER)];
  const fromIdx = order.indexOf(draggedId);
  const toIdx = order.indexOf(targetId);
  if(fromIdx<0||toIdx<0)return;
  order.splice(fromIdx,1);
  order.splice(toIdx,0,draggedId);
  state.passOrder = order;
  // Re-render reorder UI
  const effectiveChain = getEffectiveChain();
  const panel = document.getElementById('reorder-panel');
  if(panel){
    const newContent = buildReorderUI(effectiveChain);
    const tmp = document.createElement('div');
    tmp.innerHTML = newContent;
    const newPanel = tmp.querySelector('#reorder-panel');
    if(newPanel){ newPanel.style.display='block'; panel.replaceWith(newPanel); }
  }
}

function toggleRestSlot(pos){
  const slots = [...(state.restSlots||DEFAULT_REST_SLOTS)];
  const idx = slots.indexOf(pos);
  if(idx>=0) slots.splice(idx,1);
  else slots.push(pos);
  state.restSlots = slots.sort((a,b)=>a-b);
  // Re-render rest slot list
  const effectiveChain = getEffectiveChain();
  const panel = document.getElementById('reorder-panel');
  if(panel){
    const newContent = buildReorderUI(effectiveChain);
    const tmp = document.createElement('div');
    tmp.innerHTML = newContent;
    const newPanel = tmp.querySelector('#reorder-panel');
    if(newPanel){ newPanel.style.display='block'; panel.replaceWith(newPanel); }
  }
}

function saveReorder(){
  // Rebuild cycle done keys to include any new pass/rest IDs
  const cycle = curCycle();
  const newChain = getEffectiveChain();
  newChain.forEach(p=>{ if(!(p.id in cycle.done)) cycle.done[p.id]=null; });
  save();
  showToast('Chain order saved ✓');
  renderChain();
}

function saveExercise(passId,exId){

    if(isBW){
      const extraDisp = parseFloat(document.getElementById('bw-'+exId+'-'+origIdx)?.value);
      const extraKg = isNaN(extraDisp)?0:toKg(extraDisp);
      const repsOrSecs = parseInt(document.getElementById('r-'+exId+'-'+origIdx)?.value)||null;
      return isTimed ? {extra:extraKg, bwSnap:todayWkg||0, secs:repsOrSecs, forced, warmup}
                     : {extra:extraKg, bwSnap:todayWkg||0, reps:repsOrSecs, forced, warmup};
    }else{
      const weightDisp = parseFloat(document.getElementById('w-'+exId+'-'+origIdx)?.value)||null;

      const repsOrSecs = parseInt(document.getElementById('r-'+exId+'-'+origIdx)?.value)||null;
      const sideBtn=document.getElementById('side-'+exId+'-'+origIdx);

      return isTimed ? {weight:weightKg, secs:repsOrSecs, forced, warmup, side:sideVal}
                     : {weight:weightKg, reps:repsOrSecs, forced, warmup, side:sideVal};
    }
  });
  const displayName = state.exerciseOverrides?.[exId] || state.draft.swaps[exId] || ex.name;
  state.draft.savedExercises[exId]={id:exId,name:displayName,sets,bw:isBW};

// ── SET MANAGEMENT ────────────────────────────────────────────
function getDefaultSets(ex){
  const ovr=state.exerciseTagOverrides?.[ex.id];
  const r=ovr?!!ovr.ramp:!!ex.ramp;
  const b=ovr?!!ovr.bw:!!ex.bw;
  if(r) return [{warmup:false},{warmup:false},{warmup:false}];
  if(b) return [{warmup:false}];
  return [{warmup:true},{warmup:true},{warmup:false}];
}
function ensureExtraSets(exId, passId){
  ensureDraft(passId);
  const chain=getEffectiveChain();
  const pass=chain.find(p=>p.id===passId);
  const ex=pass?.exercises.find(e=>e.id===exId);
  if(state.draft.extraSets[exId]===undefined){
    state.draft.extraSets[exId] = ex ? getDefaultSets(ex) : [{warmup:false}];
  }
  // Ramp exercises must never have warmup sets — strip any
  const exTagOvr2 = state.exerciseTagOverrides?.[exId]||{};
  const isRampCheck = exTagOvr2.ramp!==undefined ? exTagOvr2.ramp : !!ex?.ramp;
  if(isRampCheck && state.draft.extraSets[exId].some(s=>s.warmup)){
    state.draft.extraSets[exId] = state.draft.extraSets[exId]
      .filter(s=>!s.warmup);
    if(state.draft.extraSets[exId].length===0)
      state.draft.extraSets[exId]=[{warmup:false},{warmup:false}]; // keep min 2
  }
}
function captureInputsToSetsBuffer(exId,passId){
  // Read current unsaved input values, convert to kg, stash in draft
  ensureExtraSets(exId,passId);
  const chain=getEffectiveChain();
  const pass=chain.find(p=>p.id===passId);
  const ex=pass?.exercises.find(e=>e.id===exId);
  const isBW=!!ex?.bw;
  const rawSets=state.draft.extraSets[exId];
  if(!state.draft.inputBuffer)state.draft.inputBuffer={};
  // Merge with existing buffer — keep prior values if DOM is empty
  const prior = state.draft.inputBuffer[exId] || [];
  state.draft.inputBuffer[exId]=rawSets.map((_,origIdx)=>{
    const p = prior[origIdx] || {};
    const domF = document.getElementById('f-'+exId+'-'+origIdx)?.value;
    const forced = (domF && domF !== '') ? (parseInt(domF)||null) : (p.forced ?? null);
    if(isBW){
      const domBw = document.getElementById('bw-'+exId+'-'+origIdx)?.value;
      const domR = document.getElementById('r-'+exId+'-'+origIdx)?.value;
      const extraDisp = (domBw && domBw !== '') ? parseFloat(domBw) : null;
      const extraKg = extraDisp!==null && !isNaN(extraDisp) ? toKg(extraDisp) : (p.extra ?? null);
      const repsOrSecs2 = (domR && domR !== '') ? (parseInt(domR)||null) : null;
      const isTimed3=!!(state.exerciseTagOverrides?.[exId]?.timed ?? ex?.timed);
      return isTimed3
        ? {extra:extraKg, bwSnap:p.bwSnap||0, secs: repsOrSecs2 ?? (p.secs ?? null), forced}
        : {extra:extraKg, bwSnap:p.bwSnap||0, reps: repsOrSecs2 ?? (p.reps ?? null), forced};
    }else{
      const domW = document.getElementById('w-'+exId+'-'+origIdx)?.value;
      const domR = document.getElementById('r-'+exId+'-'+origIdx)?.value;

function getBest(exId,isBW,isTimed){
  let best=null;
  for(const entry of state.log){
    const ex=entry.exercises?.find(e=>e.id===exId);
    if(!ex||ex.skipped)continue;
    for(const s of(ex.sets||[])){
      if(s.warmup)continue; // only look at work sets for PR
      if(isTimed){
        if(!best||(s.secs||0)>(best.secs||0))best={...s};
      }else if(isBW){
        const t=(s.extra||0)+(s.bwSnap||0);
        if(!best||t>((best.extra||0)+(best.bwSnap||0)))best={...s};
      }else{
        if(s.weight&&(!best||s.weight>best.weight||(s.weight===best.weight&&(s.reps||0)>(best.reps||0))))best={...s};
      }
    }
  }
  return best;
}
function getLastSession(exId, isBW, isTimed){
  // Find the exercise's current name (in any pass it appears in) for cross-pass matching
  // Same exercise can have different IDs (e.g. D1 Military Press vs L1 Military Press)
  const chain = getEffectiveChain();
  const targetNames = new Set();
  // Direct override for this ID
  if(state.exerciseOverrides?.[exId]) targetNames.add(state.exerciseOverrides[exId]);
  // The current name in the chain
  for(const p of chain){
    const found = p.exercises?.find(e=>e.id===exId);
    if(found){
      targetNames.add(state.exerciseOverrides?.[exId] || found.name);
      // Also collect names of OTHER exercises in chain that share this name
      // so we can find logged data that used a different ID for the same exercise
      const myName = state.exerciseOverrides?.[exId] || found.name;
      for(const p2 of chain){
        for(const e2 of (p2.exercises||[])){
          const n2 = state.exerciseOverrides?.[e2.id] || e2.name;
          if(n2===myName) targetNames.add(n2);
        }
      }
      break;
    }
  }
  function matchExercise(ex){
    if(ex.skipped) return false;
    if(ex.id===exId) return true;
    const loggedName = state.exerciseOverrides?.[ex.id] || ex.name;
    return targetNames.has(loggedName);
  }
  function getWorkSets(ex){
    return (ex.sets||[]).filter(s=>!s.warmup);
  }
  // 1) Search state.log (completed passes) — most recent first
  for(let i=(state.log||[]).length-1; i>=0; i--){
    const entry = state.log[i];
    if(!entry.exercises) continue;
    const ex = entry.exercises.find(matchExercise);
    if(!ex) continue;
    const workSets = getWorkSets(ex);
    if(workSets.length>0)
      return {sets:workSets, passName:entry.passName, timestamp:entry.timestamp};
  }
  // 2) Search state.cycles done snapshots (in-progress data not yet in log)
  // Walk cycles backwards (most recent last)
  for(let ci=(state.cycles||[]).length-1; ci>=0; ci--){
    const cycle = state.cycles[ci];
    if(!cycle?.done) continue;
    // Find the most recent completed pass that contains this exercise
    const passEntries = Object.values(cycle.done).filter(d=>d&&d.exercises);
    // Sort by some heuristic — we don't have timestamps here, but use cycle order
    for(let pi=passEntries.length-1; pi>=0; pi--){
      const passSnap = passEntries[pi];
      const ex = passSnap.exercises.find(matchExercise);
      if(!ex) continue;
      const workSets = getWorkSets(ex);
      if(workSets.length>0){
        // Use cycle.id as timestamp proxy (cycle.id = Date.now() when created)
        return {sets:workSets, passName:'', timestamp: cycle.id || Date.now()};
      }
    }
  }
  return null;
}
function getAllPRs(){const prs={};const defs=BASE_PASSES.flatMap(p=>p.exercises).map(e=>({id:e.id,name:e.name,bw:!!e.bw}));for(const entry of state.log){for(const ex of(entry.exercises||[])){if(ex.skipped||ex.extra)continue;const def=defs.find(d=>d.id===ex.id);const isBW=def?.bw;for(const s of(ex.sets||[])){if(isBW){const t=(s.extra||0)+(s.bwSnap||0);const cur=prs[ex.id];if(!cur||t>((cur.extra||0)+(cur.bwSnap||0)))prs[ex.id]={name:ex.name,extra:s.extra||0,bwSnap:s.bwSnap||0,reps:s.reps,bw:true};}else{if(!s.weight)continue;const cur=prs[ex.id];if(!cur||s.weight>cur.weight||(s.weight===cur.weight&&(s.reps||0)>(cur.reps||0)))prs[ex.id]={name:ex.name,weight:s.weight,reps:s.reps,bw:false};}}}}return Object.values(prs);}

function drawChart(data){
  const c=document.getElementById('weightChart');if(!c)return;
  const ctx=c.getContext('2d');const W=c.offsetWidth||320;const H=190;c.width=W;c.height=H;
  const ws=data.map(d=>d.weight);const labels=data.map(d=>d.date.slice(5));

  const p={t:16,r:12,b:32,l:42};const cw=W-p.l-p.r;const ch=H-p.t-p.b;
  ctx.clearRect(0,0,W,H);ctx.strokeStyle='#1a1a1a';ctx.lineWidth=1;

  if(data.length<2){ctx.beginPath();ctx.arc(p.l+cw/2,p.t+ch/2,3,0,Math.PI*2);ctx.fillStyle='#c0392b';ctx.fill();return;}
  const pts=data.map((d,i)=>({x:p.l+cw*(i/(data.length-1)),y:p.t+ch*(1-(d.weight-mn)/(mx-mn))}));
  ctx.beginPath();ctx.moveTo(pts[0].x,p.t+ch);pts.forEach(pt=>ctx.lineTo(pt.x,pt.y));ctx.lineTo(pts[pts.length-1].x,p.t+ch);ctx.closePath();
  const g=ctx.createLinearGradient(0,p.t,0,p.t+ch);g.addColorStop(0,'rgba(192,57,43,.2)');g.addColorStop(1,'rgba(192,57,43,0)');ctx.fillStyle=g;ctx.fill();
  ctx.beginPath();pts.forEach((pt,i)=>i===0?ctx.moveTo(pt.x,pt.y):ctx.lineTo(pt.x,pt.y));ctx.strokeStyle='#c0392b';ctx.lineWidth=2;ctx.stroke();
  pts.forEach((pt,i)=>{ctx.beginPath();ctx.arc(pt.x,pt.y,2.5,0,Math.PI*2);ctx.fillStyle='#c0392b';ctx.fill();if(data.length<=8||i%(Math.ceil(data.length/6))===0){ctx.fillStyle='#333';ctx.font='9px DM Mono,monospace';ctx.textAlign='center';ctx.fillText(labels[i],pt.x,H-p.b+12);}});
}

    ${THEMES.map(t=>{
      const active = (state.theme||'iron')===t.id;
      return `<button onclick="applyTheme('${t.id}');renderData();"
        style="background:${active?'#1a0000':'none'};border:1px solid ${active?'var(--red)':'#333'};
        color:${active?'var(--white)':'#888'};padding:10px 8px;cursor:pointer;text-align:left;
        font-family:var(--mono);font-size:.48rem;letter-spacing:.04em;transition:all .2s;position:relative;">
        <div style="font-family:var(--sans);font-size:.8rem;color:${active?'var(--white)':'#aaa'};margin-bottom:3px;">${t.name}</div>
        <div style="font-size:.44rem;color:#666;line-height:1.4;">${t.desc}</div>
        ${active?'<div style="position:absolute;top:6px;right:8px;color:var(--red);font-size:.6rem;">✓</div>':''}
      </button>`;
    }).join('')}
  </div>
  <div class="section-sub">Sync Status</div>
  <div id="sync-status-card" style="border:1px solid #2a2a2a;padding:12px 14px;margin-bottom:18px;font-family:var(--mono);font-size:.55rem;color:#888;line-height:1.9;">
    <div>App version: <span style="color:var(--white);">${APP_VERSION}</span></div>
    <div id="sync-cloud-version">Cloud version: <span style="color:#666;">checking…</span></div>
    <div>Last sync (read): <span id="sync-read-time" style="color:#aaa;">${formatSyncAgo(lastSyncRead)}</span></div>
    <div>Last sync (write): <span id="sync-write-time" style="color:#aaa;">${formatSyncAgo(lastSyncWrite)}</span></div>
    <div style="display:flex;gap:6px;margin-top:8px;">
      <button onclick="manualSyncNow()" style="background:none;border:1px solid #444;color:#aaa;font-family:var(--mono);font-size:.5rem;padding:6px 12px;cursor:pointer;letter-spacing:.06em;text-transform:uppercase;">Sync Now</button>
    </div>
  </div>

  <div class="section-sub">Backup</div>
  <div style="font-family:var(--mono);font-size:.58rem;color:var(--gray-light);line-height:1.8;margin-bottom:10px">Export all data as JSON. Import to restore.</div>
  <div class="data-row"><button class="data-btn" onclick="exportData()">↓ Export JSON</button><button class="data-btn" onclick="document.getElementById('importFile').click()">↑ Import JSON</button></div>
  <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(event)">
  <div class="section-sub" style="margin-top:24px">Reset</div>
  <div class="data-row"><button class="data-btn danger" onclick="resetAll()">✕ Reset all data</button></div>`;
}
function exportData(){const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`thechain-${currentUser?.id}-${todayStr()}.json`;a.click();showToast('Export done!');}
function importData(e){const file=e.target.files[0];if(!file)return;const reader=new FileReader();reader.onload=ev=>{try{const d=JSON.parse(ev.target.result);if(!d.cycles||!d.log)throw new Error('Invalid file');state=d;if(!state.unit)state.unit='kg';if(!state.exerciseOverrides)state.exerciseOverrides={};save();showToast('Data imported!');renderChain();}catch{showToast('Error: invalid file');}};reader.readAsText(file);}
function resetAll(){if(!confirm('Reset ALL data for '+currentUser?.name+'? Cannot be undone.'))return;state={cycles:[newCycle()],log:[],weightLog:[],draft:null,restCount:1,permanentSwaps:{},passOrder:state.passOrder,restSlots:state.restSlots,unit:state.unit||'kg',exerciseOverrides:{}};save();showToast('Data reset');renderChain();}

// ── REST TIMER ────────────────────────────────────────────────
let timerInterval=null;
let timerSeconds=0;
let timerEndTime=0;
let timerDefault=120; // 2 minutes default

function ensureTimerEl(){
  let el=document.getElementById('restTimer');
  if(!el){
    el=document.createElement('div');
    el.id='restTimer';
    el.className='rest-timer';
    el.innerHTML=`<span id="timerDisplay"></span>
      <div style="display:flex;flex-direction:column;gap:3px;">
        <button class="timer-btn" onclick="stopTimer()">✕</button>
        <button class="timer-btn" onclick="addTimerTime(30)">+30s</button>
      </div>`;
    document.body.appendChild(el);
  }
  return el;
}
function startRestTimer(secs){
  const dur=secs||(state.timerDefault||120);
  // Use absolute end time — survives tab-out/focus loss
  timerEndTime=Date.now()+dur*1000;
  const el=ensureTimerEl();
  if(timerInterval)clearInterval(timerInterval);
  el.className='rest-timer show';
  updateTimerDisplay();
  timerInterval=setInterval(()=>{
    const remaining=Math.ceil((timerEndTime-Date.now())/1000);
    timerSeconds=remaining;
    updateTimerDisplay();
    if(remaining<=10&&remaining>0) el.className='rest-timer show warning';
    if(remaining<=0){
      clearInterval(timerInterval);
      el.className='rest-timer show done';
      if('Notification' in window && Notification.permission==='granted'){
        new Notification('The Chain',{body:'Rest over — next set!',icon:'/favicon.ico'});
      }
      if(navigator.vibrate) navigator.vibrate([200,100,200]);
      setTimeout(()=>stopTimer(),3000);
    }
  },500); // poll every 500ms for accuracy after tab return
}
function updateTimerDisplay(){
  const disp=document.getElementById('timerDisplay');
  if(!disp)return;
  const m=Math.floor(Math.abs(timerSeconds)/60);
  const s=Math.abs(timerSeconds)%60;
  disp.textContent=(timerSeconds<0?'-':'')+(m>0?m+':':'')+(s<10&&m>0?'0':'')+s+(m===0?'s':'');
}
function addTimerTime(secs){
  timerEndTime+=secs*1000;
  timerSeconds=Math.ceil((timerEndTime-Date.now())/1000);
  const el=document.getElementById('restTimer');
  if(el)el.className='rest-timer show'; // reset warning/done state
  updateTimerDisplay();
}
function stopTimer(){
  if(timerInterval)clearInterval(timerInterval);
  timerInterval=null;
  const el=document.getElementById('restTimer');
  if(el){el.className='rest-timer';} // slides back down, not visible
}
function requestNotificationPermission(){
  if('Notification' in window && Notification.permission==='default'){
    Notification.requestPermission();
  }
}

// ── UTILS ─────────────────────────────────────────────────────
function fmtDate(ts){return new Date(ts).toLocaleDateString('en-GB',{weekday:'short',month:'short',day:'numeric'});}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2400);}


// ── VERSION COMPARISON ───────────────────────────────────────
function compareVersions(a, b){
  if(!a || !b) return 0;
  const pa = String(a).split('.').map(n=>parseInt(n)||0);
  const pb = String(b).split('.').map(n=>parseInt(n)||0);
  for(let i=0; i<Math.max(pa.length, pb.length); i++){
    const da = pa[i]||0, db = pb[i]||0;
    if(da > db) return 1;
    if(da < db) return -1;
  }
  return 0;
}

function showOldVersionBanner(cloudVersion){
  // Don't show twice
  if(document.getElementById('old-version-banner')) return;
  const banner = document.createElement('div');
  banner.id = 'old-version-banner';
  banner.style.cssText = 'position:fixed;top:0;left:0;right:0;background:#8b1a2a;color:#fff;font-family:var(--mono);font-size:.6rem;text-align:center;padding:8px 12px;z-index:9999;letter-spacing:.05em;line-height:1.5;cursor:pointer;border-bottom:1px solid #c8960c;';
  banner.innerHTML = '<strong>Update available</strong> — your app: v' + APP_VERSION + ' · cloud: v' + cloudVersion + '<br><span style="font-size:.55rem;opacity:.85;">Tap here to reload (or close tab and reopen)</span>';
  banner.onclick = ()=>{
    // Force reload bypassing cache
    location.reload(true);
  };
  document.body.appendChild(banner);
}

// ── PUSH ON PAGE HIDE ─────────────────────────────────────────
// Ensure cloud gets latest data before user switches device
document.addEventListener('visibilitychange',()=>{
  if(!currentUser) return;
  if(document.visibilityState==='hidden'){
    // Flush any pending save immediately so cloud has latest before tab leaves
    if(saveTimer){ clearTimeout(saveTimer); saveTimer=null; }
    pushState(); // fire and forget
  } else if(document.visibilityState==='visible'){
    // Tab/window became visible again — pull fresh data from cloud
    // in case another device made changes while we were away
    syncFromCloud(currentUser.id);
  }
});

// Also pull on window focus (covers cases where visibilitychange doesn't fire)
window.addEventListener('focus',()=>{
  if(currentUser) syncFromCloud(currentUser.id);
});

// Periodic background sync every 30s when tab is visible.
// Catches multi-device editing without requiring focus events.
let __periodicSyncTimer = null;
function startPeriodicSync(){
  if(__periodicSyncTimer) clearInterval(__periodicSyncTimer);
  __periodicSyncTimer = setInterval(()=>{
    if(document.visibilityState === 'visible' && currentUser){
      syncFromCloud(currentUser.id);
    }
  }, 30000);
}
window.addEventListener('beforeunload',()=>{
  if(currentUser){
    // fetch with keepalive survives page close AND sends Supabase auth headers
    // (sendBeacon can't set custom headers, so Supabase rejected it silently)
    const payload=JSON.stringify({
      id:currentUser.id,
      data:state,
      updated_at:new Date().toISOString()
    });
    try{
      fetch(SB_URL+'/rest/v1/app_state',{
        method:'POST',
        headers:{
          'apikey':SB_KEY,
          'Authorization':'Bearer '+SB_KEY,
          'Content-Type':'application/json',
          'Prefer':'resolution=merge-duplicates'
        },
        body:payload,
        keepalive:true
      }).catch(()=>{});
    }catch(e){/* best-effort */}
  }
});

</script>
