<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="The Chain — Resistance Training">
<meta name="theme-color" content="#0a0a0a">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%230a0a0a'/><text y='68' x='50' text-anchor='middle' font-size='38' font-family='serif' fill='%23c0392b'>TC</text></svg>">
<title>The Chain — Resistance Training</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>

:root{
  --black:#0a0a0a;--white:#f5f0e8;--red:#c0392b;
  --gold:#b8922a;--green-bright:#3a9a5a;
  --gray-mid:#666;--gray-light:#999;
  --mono:'DM Mono',monospace;--sans:'DM Sans',sans-serif;--display:'Bebas Neue',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--black);color:var(--white);font-family:var(--sans);min-height:100vh;overflow-x:hidden;max-width:100vw;}

/* SYNC */
.sync-dot{width:6px;height:6px;border-radius:50%;background:#333;display:inline-block;margin-left:5px;vertical-align:middle;transition:background .3s;}
.sync-dot.syncing{background:var(--gold);animation:pulse .8s infinite;}
.sync-dot.ok{background:var(--green-bright);}
.sync-dot.err{background:var(--red);}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}
@keyframes spin{to{transform:rotate(360deg);}}

/* USER SCREEN */
.user-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:32px 20px;gap:0;}
.user-logo{font-family:var(--display);font-size:3.5rem;letter-spacing:.1em;color:var(--white);margin-bottom:4px;}
.user-logo span{color:var(--red);}
.user-tagline{font-family:var(--mono);font-size:.6rem;color:#777;letter-spacing:.15em;text-transform:uppercase;margin-bottom:6px;}
.user-label{font-family:var(--mono);font-size:.6rem;color:#aaa;letter-spacing:.12em;text-transform:uppercase;margin-bottom:16px;}
.user-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%;max-width:320px;}
.user-btn{background:none;border:1px solid #2a2a2a;color:var(--white);font-family:var(--display);font-size:1.6rem;letter-spacing:.08em;padding:22px 12px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden;}
.user-btn::after{content:'';position:absolute;inset:0;background:var(--red);opacity:0;transition:opacity .2s;}
.user-btn:hover{border-color:var(--red);}
.user-btn:hover::after{opacity:.08;}
.user-btn .user-initial{position:relative;z-index:1;display:block;font-size:2.4rem;color:var(--red);margin-bottom:4px;}
.user-btn .user-name{position:relative;z-index:1;display:block;font-size:.9rem;}

/* HEADER */
header{border-bottom:1px solid #1e1e1e;padding:11px 14px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--black);z-index:100;}
.logo{font-family:var(--display);font-size:1.5rem;letter-spacing:.08em;cursor:pointer;}
.logo span{color:var(--red);}
.header-right{display:flex;flex-direction:column;align-items:flex-end;gap:2px;}
.header-user{font-family:var(--mono);font-size:.58rem;color:#aaa;letter-spacing:.1em;text-transform:uppercase;}
.header-user strong{color:var(--white);}
.header-sync{font-family:var(--mono);font-size:.5rem;color:#666;letter-spacing:.08em;text-transform:uppercase;}
nav{display:flex;border-bottom:1px solid #1e1e1e;}
nav button{flex:1;background:none;border:none;border-right:1px solid #2a2a2a;color:#aaa;font-family:var(--mono);font-size:.52rem;letter-spacing:.07em;text-transform:uppercase;padding:10px 2px;cursor:pointer;transition:all .15s;}
nav button:last-child{border-right:none;}
nav button.active{color:var(--white);background:#111;border-bottom:2px solid var(--red);}
nav button:hover:not(.active){color:var(--white);background:#0f0f0f;}
.view{display:none;}
.view.active{display:block;}

/* WEIGHT BANNER */
.weight-banner{display:flex;align-items:center;gap:8px;padding:9px 14px;border-bottom:1px solid #1a1a1a;background:#0d0d0d;flex-wrap:wrap;}
.weight-banner-label{font-family:var(--mono);font-size:.52rem;color:#aaa;text-transform:uppercase;letter-spacing:.1em;white-space:nowrap;}
.weight-input{background:#111;border:1px solid #5a1a1a;color:var(--white);font-family:var(--mono);font-size:.86rem;padding:5px 8px;width:70px;transition:border-color .15s;-moz-appearance:textfield;}
.weight-input::-webkit-outer-spin-button,.weight-input::-webkit-inner-spin-button{-webkit-appearance:none;}
.weight-input:focus{outline:none;border-color:var(--red);}
.weight-unit{font-family:var(--mono);font-size:.52rem;color:#444;text-transform:uppercase;}
.weight-log-btn{background:none;border:1px solid #2a2a2a;color:var(--gray-light);font-family:var(--mono);font-size:.5rem;letter-spacing:.07em;text-transform:uppercase;padding:5px 10px;cursor:pointer;transition:all .15s;white-space:nowrap;}
.weight-log-btn:hover{border-color:var(--red);color:var(--white);}
.weight-today{font-family:var(--mono);font-size:.56rem;color:var(--red);white-space:nowrap;margin-left:auto;}

/* CHAIN */
.chain-intro{padding:13px 14px 10px;border-bottom:1px solid #1a1a1a;display:flex;align-items:center;justify-content:space-between;}
.chain-intro-title{font-family:var(--display);font-size:1.7rem;letter-spacing:.06em;}
.chain-intro-sub{font-family:var(--mono);font-size:.52rem;color:#aaa;letter-spacing:.07em;margin-top:3px;}
.chain-bar{height:3px;background:#1a1a1a;}
.chain-fill{height:100%;background:var(--red);transition:width .4s;}
.chain-list{padding:10px 11px 80px;}
.pass-card{border:1px solid #2c2c2c;margin-bottom:8px;position:relative;overflow:hidden;}
.pass-card.next-up{border-color:var(--red);}
.pass-card.next-up::before{content:'NEXT';position:absolute;top:0;right:0;background:var(--red);color:var(--white);font-family:var(--mono);font-size:.44rem;letter-spacing:.12em;padding:2px 7px;}
.pass-card.in-progress{border-color:#2a3a2a;}
.pass-card.in-progress::before{content:'IN PROGRESS';position:absolute;top:0;right:0;background:#1a3a1a;color:var(--green-bright);font-family:var(--mono);font-size:.44rem;letter-spacing:.1em;padding:2px 7px;}
.pass-card.done{border-color:#2a2a2a;opacity:.62;}
.pass-card.rest-day{border-style:dashed;border-color:#333;}
.pass-top{display:flex;align-items:center;padding:11px 13px;gap:11px;cursor:pointer;user-select:none;}
.pass-letter{font-family:var(--display);font-size:2rem;line-height:1;color:var(--red);min-width:24px;}
.pass-card.done .pass-letter{color:#3a3a3a;}
.pass-card.rest-day .pass-letter{color:#555;}
.pass-info{flex:1;}
.pass-name{font-family:var(--display);font-size:1.05rem;letter-spacing:.05em;}
.pass-card.done .pass-name{color:#3a3a3a;}
.pass-preview{font-family:var(--mono);font-size:.5rem;color:var(--gray-light);letter-spacing:.04em;margin-top:2px;}
.pass-card.done .pass-preview{color:#333;}
.pass-done-info{font-family:var(--mono);font-size:.5rem;color:#666;text-align:right;white-space:nowrap;}
.pass-body{display:none;border-top:1px solid #181818;padding:0 12px 12px;}
.pass-card.open .pass-body{display:block;}

/* EXERCISES */
.ex-block{border-bottom:1px solid #141414;padding:8px 0 6px;}
.ex-block:last-of-type{border-bottom:none;}
.ex-block.skipped{opacity:.28;}
.ex-block.saved{background:#0a120a;}
.ex-header-row{display:flex;align-items:flex-start;justify-content:space-between;gap:6px;}
.ex-label-col{flex:1;min-width:0;}
.ex-name{font-size:.82rem;font-weight:500;}
.ex-tag{display:inline-block;font-family:var(--mono);font-size:.46rem;letter-spacing:.07em;text-transform:uppercase;padding:2px 6px;border:1px solid #333;color:#555;margin-left:5px;vertical-align:middle;border-radius:2px;}
.ex-tag.ramp{border-color:#6a4a00;background:#1a1000;color:#d4a030;}
.ex-tag.singles{border-color:#4a2a2a;background:#140a0a;color:#c07060;}
.ex-tag.bw{border-color:#1a3a1a;background:#0a140a;color:#5aaa5a;}
.ex-tag.uni{border-color:#4a3a00;background:#120e00;color:#c89030;}
.ex-detail{font-family:var(--mono);font-size:.64rem;color:#bbb;margin-top:4px;line-height:1.5;}
.ex-prev{font-family:var(--mono);font-size:.48rem;color:#555;margin-top:3px;line-height:1.5;}
.ex-prev span{color:#777;}
.ex-prev .last-val{color:#6a8a6a;font-style:italic;}
.ex-note-banner{font-family:var(--mono);font-size:.54rem;color:#8a7000;background:#1a1400;border-left:2px solid #8a5a00;padding:5px 9px;margin:4px 0;line-height:1.5;cursor:pointer;}
.ex-note-banner:hover{border-left-color:var(--gold);}
.ex-note-wrap{margin:4px 0;}
.ex-note-input{width:100%;background:#111;border:1px solid #3a3000;color:var(--white);font-family:var(--mono);font-size:.56rem;padding:6px 8px;resize:vertical;min-height:48px;line-height:1.6;}
.ex-note-input:focus{outline:none;border-color:var(--gold);}
.ex-note-actions{display:flex;gap:4px;margin-top:4px;}
.ex-note-save{background:#2a1a00;border:1px solid var(--gold);color:var(--gold);font-family:var(--mono);font-size:.44rem;letter-spacing:.06em;text-transform:uppercase;padding:4px 10px;cursor:pointer;}
.ex-note-save:hover{background:#3a2a00;}
.ex-note-clear{background:none;border:1px solid #2a2a2a;color:#444;font-family:var(--mono);font-size:.44rem;letter-spacing:.06em;text-transform:uppercase;padding:4px 8px;cursor:pointer;}
.ex-note-clear:hover{color:#888;}
.ex-action-col{display:flex;flex-direction:column;align-items:flex-end;gap:3px;padding-top:1px;flex-shrink:0;}
.ex-mini-btns{display:flex;gap:3px;flex-wrap:wrap;justify-content:flex-end;}
.ex-mini-btn{background:none;border:1px solid #333;color:#666;font-family:var(--mono);font-size:.44rem;letter-spacing:.05em;padding:3px 6px;cursor:pointer;text-transform:uppercase;transition:all .15s;white-space:nowrap;}
.ex-mini-btn:hover{border-color:#555;color:var(--gray-light);}
.ex-mini-btn.save-btn{border-color:#1a3a1a;color:#3a7a3a;}
.ex-mini-btn.save-btn:hover{border-color:var(--green-bright);color:var(--green-bright);}
.ex-saved-badge{font-family:var(--mono);font-size:.44rem;color:var(--green-bright);letter-spacing:.08em;}
.ex-btn-done{background:#0d2a0d;border:1px solid var(--green-bright);color:var(--green-bright);font-family:var(--mono);font-size:.52rem;font-weight:500;letter-spacing:.05em;padding:5px 10px;cursor:pointer;text-transform:uppercase;transition:all .15s;white-space:nowrap;}
.ex-btn-done:hover{background:#1a4a1a;}
.ex-btn-skip{background:none;border:1px solid #5a3a00;color:#b87a00;font-family:var(--mono);font-size:.44rem;letter-spacing:.05em;padding:3px 7px;cursor:pointer;text-transform:uppercase;transition:all .15s;white-space:nowrap;}
.ex-btn-skip:hover{border-color:#c08800;color:#c08800;}
.ex-btn-edit{background:none;border:1px solid #444;color:#888;font-family:var(--mono);font-size:.44rem;letter-spacing:.05em;padding:3px 7px;cursor:pointer;text-transform:uppercase;transition:all .15s;white-space:nowrap;}
.ex-btn-edit:hover{border-color:#666;color:#888;}
.ex-edit-dropdown{position:relative;display:inline-block;}
.ex-edit-menu{display:none;position:absolute;right:0;top:100%;background:#1a1a1a;border:1px solid #333;z-index:50;min-width:120px;margin-top:2px;}
.ex-edit-menu.open{display:block;}
.ex-edit-menu button{display:block;width:100%;background:none;border:none;border-bottom:1px solid #222;color:#888;font-family:var(--mono);font-size:.44rem;letter-spacing:.05em;text-transform:uppercase;padding:7px 10px;cursor:pointer;text-align:left;transition:color .15s;}
.ex-edit-menu button:last-child{border-bottom:none;}
.ex-edit-menu button:hover{color:var(--white);background:#252525;}

/* SETS */
.sets-table{margin-top:6px;width:100%;}
.set-row{display:grid;align-items:center;gap:4px;margin-bottom:4px;}
.set-row.normal-set{grid-template-columns:28px 1fr 1fr 1fr 18px;}
.set-row.uni-set{grid-template-columns:28px 1fr 1fr 1fr 28px 18px;}
.set-row.bw-set{grid-template-columns:28px 1fr 1fr 1fr 18px;}
.set-num{font-family:var(--mono);font-size:.44rem;color:#666;text-transform:uppercase;letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.set-num.warmup-label{color:#4a4a4a;}
.set-input{background:#111;border:1px solid #3a1a1a;color:var(--white);font-family:var(--mono);font-size:.76rem;padding:5px 5px;text-align:center;transition:border-color .15s;-moz-appearance:textfield;width:100%;}
.set-input::-webkit-outer-spin-button,.set-input::-webkit-inner-spin-button{-webkit-appearance:none;}
.set-input:focus{outline:none;border-color:var(--red);}
.set-input:disabled{opacity:.2;cursor:not-allowed;}
.set-input.warmup{border-color:#181818;color:#3a3a3a;}
.set-input.work-set{border-color:#1a2a1a;}
.set-input.forced{border-color:#2a1a2a;color:#9a6a9a;}
.set-input.timed{border-color:#1a2a3a;color:#7ab;}
.set-unit{font-family:var(--mono);font-size:.44rem;color:#333;text-transform:uppercase;text-align:center;margin-top:1px;}
.set-unit.forced-unit{color:#5a3a5a;}
.set-unit.time-unit{color:#3a5a5a;}
.side-btn{background:none;border:1px solid #3a2a00;color:#c89030;font-family:var(--mono);font-size:.6rem;font-weight:600;padding:3px 6px;cursor:pointer;transition:all .15s;width:100%;text-align:center;}
.side-btn.left{border-color:#2a3a6a;color:#6090c0;}
.side-btn.right{border-color:#6a2a2a;color:#c06060;}
.side-btn:disabled{opacity:.3;cursor:not-allowed;}
.sets-group-label{font-family:var(--mono);font-size:.42rem;color:#666;text-transform:uppercase;letter-spacing:.1em;padding:4px 0 2px;margin-top:4px;border-top:1px solid #1a1a1a;}
.sets-group-label.warmup-group{color:#664a4a;border-top-color:#1a1a1a;}
.sets-group-label.work-group{color:#4a664a;border-top-color:#2a2a2a;margin-top:6px;}
.set-delete{background:none;border:none;color:#555;font-size:.7rem;cursor:pointer;padding:0 2px;transition:color .15s;line-height:1;}
.set-delete:hover{color:var(--red);}
.bw-snap{font-family:var(--mono);font-size:.5rem;color:#3a3a3a;text-align:center;padding:1px 0 2px;}
.add-set-btn{background:none;border:1px dashed #333;color:#666;font-family:var(--mono);font-size:.46rem;letter-spacing:.07em;text-transform:uppercase;padding:4px;width:100%;cursor:pointer;transition:all .15s;margin-top:2px;display:flex;align-items:center;justify-content:center;gap:3px;}
.add-set-btn:hover{border-color:var(--red);color:#777;}
.swap-select{background:#111;border:1px solid #5a1a1a;color:var(--white);font-family:var(--mono);font-size:.56rem;padding:4px 6px;width:100%;margin-top:4px;cursor:pointer;}
.swap-select:focus{outline:none;border-color:var(--red);}
.swap-select option{background:#111;}
.add-ex-row{padding:6px 0 0;}
.add-ex-btn{background:none;border:1px dashed #333;color:#666;font-family:var(--mono);font-size:.5rem;letter-spacing:.07em;text-transform:uppercase;padding:7px;width:100%;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:4px;}
.add-ex-btn:hover{border-color:var(--red);color:#777;}
.add-ex-form{margin-top:5px;display:flex;gap:4px;align-items:center;}
.add-ex-input{flex:1;background:#111;border:1px solid #5a1a1a;color:var(--white);font-family:var(--mono);font-size:.68rem;padding:6px 8px;}
.add-ex-input:focus{outline:none;border-color:var(--red);}
.add-ex-confirm{background:var(--red);border:none;color:var(--white);font-family:var(--mono);font-size:.52rem;letter-spacing:.06em;text-transform:uppercase;padding:6px 10px;cursor:pointer;}
.rest-content{padding:10px 0 3px;font-family:var(--mono);font-size:.64rem;color:#484848;line-height:1.8;}
.pass-actions{display:flex;gap:6px;margin-top:10px;}
.btn-primary{flex:1;background:var(--red);border:none;color:var(--white);font-family:var(--display);font-size:.95rem;letter-spacing:.1em;padding:10px;cursor:pointer;transition:background .15s;}
.btn-primary:hover{background:#a83226;}
.btn-primary:disabled{background:#3a1a1a;color:#5a3a3a;cursor:not-allowed;}
.btn-secondary{background:none;border:1px solid #444;color:#888;font-family:var(--mono);font-size:.52rem;letter-spacing:.06em;padding:0 10px;cursor:pointer;text-transform:uppercase;transition:all .15s;}
.btn-secondary:hover{border-color:#555;color:var(--gray-light);}
.btn-ghost{flex:1;background:none;border:1px solid #3a3a3a;color:#888;font-family:var(--display);font-size:.95rem;letter-spacing:.1em;padding:10px;cursor:pointer;transition:all .15s;}
.btn-ghost:hover{border-color:#444;color:#777;}
.draft-notice{font-family:var(--mono);font-size:.5rem;color:#4a7a4a;text-align:center;padding:5px;border:1px solid #2a4a2a;margin-top:7px;}
.cycle-done{padding:44px 20px;text-align:center;}

/* EDIT FLOW */
.edit-page{padding:16px 14px 80px;max-width:560px;margin:0 auto;}
.edit-back{display:flex;align-items:center;gap:8px;font-family:var(--mono);font-size:.52rem;color:#888;text-transform:uppercase;letter-spacing:.08em;cursor:pointer;padding:4px 0 16px;transition:color .15s;}
.edit-back:hover{color:var(--white);}
.edit-title{font-family:var(--display);font-size:2rem;letter-spacing:.06em;margin-bottom:6px;}
.edit-sub{font-family:var(--mono);font-size:.54rem;color:#888;margin-bottom:24px;}
.edit-cards{display:grid;grid-template-columns:1fr;gap:10px;}
.edit-card{border:1px solid #2a2a2a;padding:20px 18px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden;}
.edit-card::after{content:'→';position:absolute;right:18px;top:50%;transform:translateY(-50%);font-family:var(--mono);font-size:1.2rem;color:#444;transition:all .2s;}
.edit-card:hover{border-color:var(--red);background:#0d0000;}
.edit-card:hover::after{color:var(--red);right:14px;}
.edit-card-icon{font-size:1.8rem;margin-bottom:8px;}
.edit-card-title{font-family:var(--display);font-size:1.4rem;letter-spacing:.06em;margin-bottom:4px;}
.edit-card-desc{font-family:var(--mono);font-size:.52rem;color:#888;line-height:1.6;}
.edit-section-title{font-family:var(--display);font-size:1.4rem;letter-spacing:.05em;margin-bottom:4px;}
.edit-section-sub{font-family:var(--mono);font-size:.52rem;color:#888;margin-bottom:16px;}
.edit-save-bar{display:flex;gap:8px;margin-top:20px;}
.cycle-done-title{font-family:var(--display);font-size:2.6rem;color:var(--red);letter-spacing:.06em;margin-bottom:8px;}
.cycle-done-sub{font-family:var(--mono);font-size:.62rem;color:var(--gray-light);letter-spacing:.08em;margin-bottom:28px;line-height:1.8;}
#view-progress,#view-weight,#view-data{padding:14px 12px 60px;max-width:640px;margin:0 auto;}
.section-title{font-family:var(--display);font-size:1.85rem;letter-spacing:.06em;margin-bottom:14px;}
.section-sub{font-family:var(--mono);font-size:.54rem;color:#aaa;text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px;margin-top:20px;}
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:18px;}
.stat-box{border:1px solid #2c2c2c;padding:12px 10px;}
.stat-num{font-family:var(--display);font-size:2rem;color:var(--red);line-height:1;}
.stat-desc{font-family:var(--mono);font-size:.46rem;color:var(--gray-light);text-transform:uppercase;letter-spacing:.07em;margin-top:3px;}
.pr-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:6px;}
.pr-card{border:1px solid #2c2c2c;padding:9px 11px;position:relative;overflow:hidden;}
.pr-card::before{content:'PR';position:absolute;top:0;right:0;background:#1a1400;color:var(--gold);font-family:var(--mono);font-size:.42rem;letter-spacing:.12em;padding:2px 5px;}
.pr-ex-name{font-size:.72rem;font-weight:500;margin-bottom:2px;margin-right:18px;}
.pr-value{font-family:var(--display);font-size:1.4rem;color:var(--gold);line-height:1;}
.pr-sub{font-family:var(--mono);font-size:.46rem;color:#4a4a4a;margin-top:2px;}
.hist-entry{border:1px solid #2a2a2a;margin-bottom:6px;}
.hist-header{padding:9px 11px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;}
.hist-date{font-family:var(--display);font-size:.95rem;letter-spacing:.04em;}
.hist-pass{font-family:var(--mono);font-size:.5rem;color:#e05040;text-transform:uppercase;letter-spacing:.08em;margin-top:1px;}
.hist-body{display:none;border-top:1px solid #252525;padding:0 11px 10px;}
.hist-entry.open .hist-body{display:block;}

// ── IMPROVEMENT 3: Pass order is per-user, drag & drop reorderable ─
// Default pass order (can be reordered per user)
const DEFAULT_PASS_ORDER=['A','B','C','D','E','F'];

// ── IMPROVEMENT 4: Rest days can be placed after any pass ─
// Default rest slots: just after F (position 6 = end)
// Each rest slot has a position index (0=before A, 1=after A, ..., 6=after F)
const DEFAULT_REST_SLOTS=[6]; // after F by default

const BASE_PASSES=[
  {id:'A',name:'Chest + Tri',exercises:[{id:'A1',name:'Flat BB',detail:'Ramping → 1 set failure',ramp:true},{id:'A2',name:'Incline Smith or Incline DB',detail:'1 set failure'},{id:'A3',name:'Pec Deck / Cable Flyes',detail:'Full ROM - Deep stretch · 1 set failure'},{id:'A4',name:'Tri-finisher (Pushdowns/Overhead)',detail:'1 set failure'}]},
  {id:'B',name:'Back Heavy + Biceps',exercises:[{id:'B1',name:'Dead Hang',detail:'Supinated or neutral · 1 set failure',bw:true,timed:true},{id:'B2',name:'Deadlift',detail:'Ramping'},{id:'B3',name:'Unilateral Cable Row',detail:'1 set failure',uni:true},{id:'B4',name:'Lat Prayers',detail:'1 set failure'}]},
  {id:'C',name:'Legs + Calfs',exercises:[{id:'C1',name:'Zercher Squat',detail:'Ramping → 1 set failure',ramp:true},{id:'C2',name:'Lying Leg Curl',detail:'1 set failure'},{id:'C3',name:'Leg Extension',detail:'1 set failure'},{id:'C4',name:'Calfs (standing + seated)',detail:'2 sets'}]},
  {id:'D',name:'Shoulders + Traps',exercises:[{id:'D1',name:'Military Press',detail:'Ramping → 1 set failure',ramp:true},{id:'D2',name:'Lateral Raises DB/Cable',detail:'1 set failure'},{id:'D3',name:'Helms Rear Delt Row / Face Pulls',detail:'1 set failure'},{id:'D4',name:'Cable Rotator Cuff',detail:'1 set'}]},
  {id:'E',name:'Chest pt. 2',exercises:[{id:'E1',name:'Flat DB',detail:'Ramping → 1 set failure',ramp:true},{id:'E2',name:'Decline Smith / DB',detail:'1 set failure'},{id:'E3',name:'Pec Deck / Cable Flyes',detail:'1 set failure'},{id:'E4',name:'Tri-finisher (Pushdowns)',detail:'1 set failure'}]},
  {id:'F',name:'Back pt. 2',exercises:[{id:'F1',name:'Chins or Pullups',detail:'1 set failure',bw:true},{id:'F2',name:'Unilateral Cable Row',detail:'1 set failure',uni:true},{id:'F3',name:'Shrugs',detail:'1 set failure'},{id:'F4',name:'Lat Prayers',detail:'1 set failure'}]},
];

// Build the effective chain from user's pass order + rest slot positions
// restSlots = array of positions (0-6) where 0=before first pass, 1=after 1st pass, etc.
// passOrder = array of pass IDs in display order
function buildEffectiveChain(passOrder, restSlots){
  const po = passOrder || DEFAULT_PASS_ORDER;
  const rs = restSlots || DEFAULT_REST_SLOTS;
  const passes = po.map(id => BASE_PASSES.find(p => p.id === id)).filter(Boolean);
  // Insert rest days at specified positions
  // Sort slots descending to insert from end without shifting earlier indices
  const sortedSlots = [...new Set(rs)].sort((a,b)=>b-a);
  const result = [...passes];
  let restIdx = 1;
  for(const pos of sortedSlots){
    const clampedPos = Math.max(0, Math.min(pos, result.length));
    const restId = restIdx===1 ? 'V' : ('V'+String.fromCharCode(64+restIdx)); // V, VB, VC, VD...
    result.splice(clampedPos, 0, {id:restId, name:'Rest Day', rest:true, exercises:[], restSlotPos:pos});
    restIdx++;
  }
  // Assign display letters A-Z to workout passes
  let letterIdx = 0;
  const letters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
  return result.map((p,i) => {
    if(p.rest) return {...p, displayId:'V'+(p.restSlotPos!==undefined?'':'')}; // keep rest id
    const letter = letters[letterIdx++];
    return {...p, displayLetter: letter};
  });
}

// Get current effective chain for rendering
function getEffectiveChain(){
  const po = state.passOrder || DEFAULT_PASS_ORDER;
  const rs = state.restSlots || DEFAULT_REST_SLOTS;
  return buildEffectiveChain(po, rs);
}

// Get all cycle done keys based on current chain
function getCycleDoneKeys(){
  const chain = getEffectiveChain();
  return chain.map(p => p.id);
}

let currentUser=null;
let state={cycles:[],log:[],weightLog:[],draft:null,restCount:1,permanentSwaps:{},passOrder:null,restSlots:null,unit:'kg',exerciseOverrides:{},passNameOverrides:{},timerDefault:120,timerEnabled:false,exerciseNotes:{}};
state.cycles=[newCycle()];

function newCycle(){
  const c={id:Date.now(),done:{}};
  getEffectiveChain().forEach(p=>c.done[p.id]=null);
  return c;
}
function curCycle(){return state.cycles[state.cycles.length-1];}

function nextPassId(){
  const c=curCycle();
  const chain=getEffectiveChain();
  for(const p of chain){
    const key = p.id;
    if(c.done[key]===null||c.done[key]===undefined) return p.id;
  }
  return null;
}
function ensureDraft(passId){if(!state.draft||state.draft.passId!==passId)state.draft={passId,savedExercises:{},extras:[],swaps:{},extraSets:{}};}

// ── LOCAL STORAGE ─────────────────────────────────────────────
function lsKey(uid){return 'thechain_'+uid;}

// ── UNIT CONVERSION (Improvement 5) ──────────────────────────
function toDisplay(kg){
  if(kg===null||kg===undefined)return null;
  if(state.unit==='lbs'){
    // Round to nearest 0.5 lbs for display readability
    return Math.round(kg*2.20462*2)/2;
  }
  return kg;
}
function toKg(val){
  if(val===null||val===undefined)return null;
  // Store exact kg — no lossy rounding
  if(state.unit==='lbs') return val/2.20462;
  return val;
}
function unitLabel(){return state.unit||'kg';}

// ── USER SELECT: LOCAL FIRST ───────────────────────────────────
function selectUser(userId){
  currentUser=USERS[userId];
  document.getElementById('headerUser').textContent=currentUser.name;

  const raw=localStorage.getItem(lsKey(userId));
  if(raw){
    try{
      const saved=JSON.parse(raw);
      if(saved&&saved.cycles){
        state=saved;
        if(!state.log)state.log=[];
        if(!state.weightLog)state.weightLog=[];
        if(!state.draft)state.draft=null;
        if(!state.permanentSwaps)state.permanentSwaps={};
        if(!state.passOrder)state.passOrder=null;
        if(!state.restSlots)state.restSlots=null;
        if(!state.unit)state.unit='kg';
        if(!state.exerciseOverrides)state.exerciseOverrides={};
        if(!state.passNameOverrides)state.passNameOverrides={};
        if(!state.exerciseNotes)state.exerciseNotes={};
        if(state.timerEnabled===undefined)state.timerEnabled=false;
        if(state.timerEnabled===undefined)state.timerEnabled=false;
      }
    }catch(e){console.warn('localStorage parse error',e);}
  }

  // Show unit picker only if user has never set it (first time ever for this user)
  const unitAlreadySet = raw && state.unit;
  document.getElementById('userScreen').style.display='none';
  document.getElementById('appShell').style.display='block';

  if(!unitAlreadySet){
    showUnitDialog(userId);
    // Don't return — still kick off background sync
    syncFromCloud(userId);
    return;
  }

  // Restore any pass name overrides into BASE_PASSES
  if(state.passNameOverrides){
    Object.entries(state.passNameOverrides).forEach(([pid,name])=>{
      const bp=BASE_PASSES.find(p=>p.id===pid);
      if(bp) bp.name=name;
    });
  }
  requestNotificationPermission();
  renderChain();
  syncFromCloud(userId);
}

    </div>`;
}

function setUnit(unit, userId){
  state.unit=unit;
  save();
  renderChain();
  // syncFromCloud already called in selectUser — no double call needed
}

async function syncFromCloud(userId){
  setSyncDot('syncing');
  try{
    const rows=await sbGet('app_state','id=eq.'+userId+'&select=data');
    if(rows&&rows.length&&rows[0].data){
      const cloud=rows[0].data;
      const localN=(state.log||[]).length;
      const cloudN=(cloud.log||[]).length;
      if(cloudN>localN){
        state=cloud;
        if(!state.log)state.log=[];
        if(!state.weightLog)state.weightLog=[];
        if(!state.draft)state.draft=null;
        if(!state.permanentSwaps)state.permanentSwaps={};
        if(!state.passOrder)state.passOrder=null;
        if(!state.restSlots)state.restSlots=null;
        if(!state.unit)state.unit='kg';
        if(!state.exerciseOverrides)state.exerciseOverrides={};
        if(!state.passNameOverrides)state.passNameOverrides={};
        if(!state.exerciseNotes)state.exerciseNotes={};
        if(state.timerEnabled===undefined)state.timerEnabled=false;
        localStorage.setItem(lsKey(userId),JSON.stringify(state));
        renderChain();
      }
    }
    setSyncDot('ok');
    setTimeout(()=>setSyncDot(''),3000);
  }catch(e){
    console.warn('Background sync error:',e);
    setSyncDot('err');
  }
}

function switchUser(){
  if(!confirm('Switch user? Your data is saved.'))return;
  currentUser=null;
  state={cycles:[],log:[],weightLog:[],draft:null,restCount:1,permanentSwaps:{},passOrder:null,restSlots:null,unit:'kg',exerciseOverrides:{}};
  state.cycles=[newCycle()];
  document.getElementById('appShell').style.display='none';
  document.getElementById('userScreen').style.display='block';
}

// ── SUPABASE ──────────────────────────────────────────────────
function setSyncDot(s){const d=document.getElementById('syncDot');if(d)d.className='sync-dot '+s;}
async function sbGet(table,query=''){const r=await fetch(`${SB_URL}/rest/v1/${table}${query?'?'+query:''}`,{headers:HDRS,mode:'cors'});if(!r.ok)throw new Error(await r.text());return r.json();}
async function sbUpsert(table,data){const r=await fetch(`${SB_URL}/rest/v1/${table}`,{method:'POST',headers:{...HDRS,'Prefer':'resolution=merge-duplicates'},body:JSON.stringify(data),mode:'cors'});if(!r.ok)throw new Error(await r.text());}

let saveTimer=null;
function scheduleSave(){clearTimeout(saveTimer);saveTimer=setTimeout(pushState,800);}
async function pushState(){
  setSyncDot('syncing');
  try{
    await sbUpsert('app_state',{id:currentUser.id,data:state,updated_at:new Date().toISOString()});
    setSyncDot('ok');setTimeout(()=>setSyncDot(''),3000);
  }catch(e){console.error('Cloud push error:',e);setSyncDot('err');}
}
function save(){
  if(currentUser){try{localStorage.setItem(lsKey(currentUser.id),JSON.stringify(state));}catch(e){console.warn('localStorage write failed',e);}}
  scheduleSave();
}

// ── NAV ───────────────────────────────────────────────────────
function showView(name,btn){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b=>b.classList.remove('active'));
  document.getElementById('view-'+name).classList.add('active');
  if(btn)btn.classList.add('active');
  if(name==='progress')renderProgress();
  if(name==='weight')renderWeight();
  if(name==='data')renderData();
}

// ── WEIGHT ────────────────────────────────────────────────────
function todayStr(){return new Date().toLocaleDateString('sv-SE',{year:'numeric',month:'2-digit',day:'2-digit'});}
function getTodayWeight(){return(state.weightLog.find(e=>e.date===todayStr())||{}).weight||null;}
function logWeight(){
  const inp=document.getElementById('morningWeight');const val=parseFloat(inp.value);
  if(!val||val<(state.unit==='lbs'?44:20)||val>(state.unit==='lbs'?660:300)){showToast('Enter a valid weight!');return;}
  const kgVal = state.unit==='lbs' ? toKg(val) : val;
  const today=todayStr();const idx=state.weightLog.findIndex(e=>e.date===today);
  if(idx>=0)state.weightLog[idx].weight=kgVal;else state.weightLog.push({date:today,weight:kgVal});
  save();showToast(val+' '+unitLabel()+' logged ✓');
  const el=document.getElementById('weightBannerToday');if(el)el.textContent=val+' '+unitLabel()+' today';
}

// ── CHAIN RENDER ──────────────────────────────────────────────
function renderChain(){
  const el=document.getElementById('view-chain');
  const cycle=curCycle();
  const nextId=nextPassId();
  const effectiveChain=getEffectiveChain();
  const totalPasses=effectiveChain.filter(p=>!p.rest).length;
  const donePasses=effectiveChain.filter(p=>!p.rest&&cycle.done[p.id]!==null&&cycle.done[p.id]!==undefined).length;
  const pct=Math.round(donePasses/totalPasses*100);
  const todayWkg=getTodayWeight();
  const todayW = todayWkg ? toDisplay(todayWkg) : null;

  if(!nextId){
    el.innerHTML=`<div class="cycle-done"><div class="cycle-done-title">CHAIN COMPLETE</div><div class="cycle-done-sub">Full cycle done.<br>Ready for the next round.</div><button class="btn-primary" style="display:inline-block;padding:14px 36px;font-size:1.2rem" onclick="doNewCycle()">Start New Round →</button></div>`;
    return;
  }

  let html=`<div class="weight-banner"><span class="weight-banner-label">Morning Weight</span><div style="display:flex;align-items:center;gap:4px"><input class="weight-input" type="number" id="morningWeight" placeholder="${state.unit==='lbs'?'165.0':'75.0'}" step="${state.unit==='lbs'?'0.5':'0.1'}" min="${state.unit==='lbs'?'44':'20'}" max="${state.unit==='lbs'?'660':'300'}" value="${todayW||''}"><span class="weight-unit">${unitLabel()}</span></div><span id="weightBannerToday" class="weight-today">${todayW?todayW+' '+unitLabel()+' today':''}</span><button class="weight-log-btn" onclick="logWeight()">Log</button></div><div class="chain-intro"><div><div class="chain-intro-title">The Chain</div><div class="chain-intro-sub">${donePasses}/${totalPasses} sessions done · Round ${state.cycles.length}</div></div><div style="display:flex;align-items:center;gap:8px"><span style="font-family:var(--mono);font-size:.52rem;color:var(--gray-mid)">${pct}%</span><button style="background:none;border:1px solid #444;color:#888;font-family:var(--mono);font-size:.44rem;letter-spacing:.06em;text-transform:uppercase;padding:4px 10px;cursor:pointer;transition:all .15s;" onmouseover="this.style.borderColor='var(--red)';this.style.color='var(--white)'" onmouseout="this.style.borderColor='#444';this.style.color='#888'" onclick="showEditPage()">Edit Chain</button></div></div><div class="chain-bar"><div class="chain-fill" style="width:${pct}%"></div></div>`;


  html += `<div class="chain-list">`;

  effectiveChain.forEach((pass,chainIdx)=>{
    const passId=pass.id;
    const isDone=(cycle.done[passId]!==null&&cycle.done[passId]!==undefined);
    const isNext=passId===nextId;
    const isRest=!!pass.rest;
    const hasDraft=state.draft&&state.draft.passId===passId;
    const inProgress=hasDraft&&Object.keys(state.draft.savedExercises).length>0;
    const completedData=isDone?cycle.done[passId]:null;
    const displayLetter = pass.rest ? 'V' : (pass.displayLetter || passId);

    let cls='pass-card';
    if(isDone)cls+=' done';else if(inProgress)cls+=' in-progress';else if(isNext)cls+=' next-up';
    if(isRest)cls+=' rest-day';
    const preview=isRest?'Rest · Dead Hang · Walk':pass.exercises.map(e=>{
      const ovr = state.exerciseOverrides && state.exerciseOverrides[e.id];
      return (ovr||e.name).split('/')[0].trim();
    }).join(' · ');

    html+=`<div class="${cls}" id="card-${passId}"><div class="pass-top" onclick="toggleCard('${passId}')"><div class="pass-letter">${displayLetter}</div><div class="pass-info"><div class="pass-name">${pass.name}</div><div class="pass-preview">${preview}</div></div><div class="pass-done-info">${isDone?'✓ '+(completedData?.date||''):inProgress?'↓ draft':''}</div></div><div class="pass-body">`;

    if(isRest){
      html+=`<div class="rest-content">Active rest. Light walk or dead hang at home.<br>No heavy lifting — recovery IS training.</div><div class="pass-actions">${isDone?`<button class="btn-ghost" onclick="undoPass('${passId}')">↩ Undo</button>`:`<button class="btn-ghost" onclick="doneRest('${passId}')">Mark Rest Done →</button>`}</div>`;
    }else{
      const draft=hasDraft?state.draft:null;
      const savedExs=draft?draft.savedExercises:{};
      const draftSwaps=draft?draft.swaps:{};
      const draftExtraSets=draft?draft.extraSets:{};
      const extras=draft?draft.extras:[];

      pass.exercises.forEach(ex=>{
        const isSaved=!isDone&&!!savedExs[ex.id]&&!savedExs[ex.id].skipped&&!savedExs[ex.id].editing;
        const isSkipped=!isDone&&savedExs[ex.id]?.skipped===true;
        const isBW=!!ex.bw;
        const isTimed=!!ex.timed;
        const isUni=!!ex.uni;
        // Improvement 6: exercise overrides (rename main exercises)
        const globalOverride = state.exerciseOverrides && state.exerciseOverrides[ex.id];
        const sessionSwap = draftSwaps[ex.id];
        const permSwap = state.permanentSwaps && state.permanentSwaps[ex.id];
        const customName = sessionSwap || permSwap || globalOverride || ex.name;

        // Improvement 7: default 2 warmup sets
        let extraSets=draftExtraSets[ex.id];
        if(!extraSets){
          // Default: 2 warmup sets for all exercises
          extraSets=[{warmup:true},{warmup:true}];
          if(!isDone&&!hasDraft){
            // lazy-init default warmups in draft
          }
        }
        const prev=null; // PR shown in Progress tab only — not in chain view
        const savedData=isDone?completedData?.exercises?.find(e=>e.id===ex.id):savedExs[ex.id];

        let tags='';if(ex.ramp)tags+=`<span class="ex-tag ramp">Ramp</span>`;if(ex.singles)tags+=`<span class="ex-tag singles">Singles</span>`;if(isBW)tags+=`<span class="ex-tag bw">BW+</span>`;if(isUni)tags+=`<span class="ex-tag uni">Unilateral</span>`;
        const lastSession=getLastSession(ex.id,isBW,isTimed);
        let prevText='';
        if(lastSession){
          // Show only the last work set (most recent, highest index)
          const workSets=lastSession.sets.filter(s=>!s.warmup);
          const lastSet=workSets[workSets.length-1]||lastSession.sets[lastSession.sets.length-1];
          let lastStr='';
          if(lastSet){
            if(isTimed) lastStr=`${lastSet.secs||'?'}s`;
            else if(isBW) lastStr=`BW+${toDisplay(lastSet.extra)||0}${unitLabel()} ×${lastSet.reps||'?'}r${lastSet.forced?` +${lastSet.forced}f`:''}`;
            else lastStr=`${toDisplay(lastSet.weight)||'—'}${unitLabel()} ×${lastSet.reps||'?'}r${lastSet.forced?` +${lastSet.forced}f`:''}`;
          }
          const daysAgo=Math.floor((Date.now()-lastSession.timestamp)/86400000);
          const whenStr=daysAgo===0?'today':daysAgo===1?'1d ago':`${daysAgo}d ago`;
          prevText=`<div class="ex-prev"><span class="last-val">Last (${whenStr}): ${lastStr}</span></div>`;
        }

        const existingNote = state.exerciseNotes?.[ex.id]||'';
        const noteBanner = existingNote && !isDone
          ? `<div class="ex-note-banner" onclick="toggleNote('${ex.id}')" title="Tap to edit">📝 ${existingNote}</div>` : '';
        html+=`<div class="${'ex-block'+(isSkipped?' skipped':'')+(isSaved?' saved':'')}" id="exblock-${ex.id}">`;
        html+=`<div class="ex-header-row"><div class="ex-label-col"><div class="ex-name">${customName}${tags}</div><div class="ex-detail">${ex.detail}</div>${prevText}${noteBanner}</div><div class="ex-action-col">`;

        if(!isDone&&!isSkipped){
          html+=`<div class="ex-mini-btns">`;
          if(isSaved){
            html+=`<span class="ex-saved-badge">✓ Done</span>
              <button class="ex-btn-edit" onclick="unsaveExercise('${passId}','${ex.id}')">Edit ▾</button>`;
          }else{
            html+=`<button class="ex-btn-done" onclick="saveExercise('${passId}','${ex.id}')">Done</button>`;
            html+=`<button class="ex-btn-skip" onclick="skipExercise('${passId}','${ex.id}')">Skip</button>`;
            html+=`<div class="ex-edit-dropdown" id="editdd-${ex.id}">
              <button class="ex-btn-edit" onclick="toggleEditMenu('${ex.id}')">Edit ▾</button>
              <div class="ex-edit-menu" id="editmenu-${ex.id}">
                <button onclick="toggleSwap('${ex.id}','${passId}','temp');closeEditMenu('${ex.id}')">Swap (session)</button>
                <button onclick="toggleSwap('${ex.id}','${passId}','perm');closeEditMenu('${ex.id}')">Swap (always)</button>
                <button onclick="toggleRename('${ex.id}');closeEditMenu('${ex.id}')">Rename</button>
                <button onclick="toggleNote('${ex.id}');closeEditMenu('${ex.id}')" style="color:var(--gold)">📝 Note</button>
              </div>
            </div>`;
          }
          html+=`</div>`;
        }else if(!isDone&&isSkipped){
          html+=`<div class="ex-mini-btns">
            <span style="font-family:var(--mono);font-size:.44rem;color:#5a3a00;">Skipped</span>
            <button class="ex-btn-edit" onclick="unskipExercise('${passId}','${ex.id}')">↩ Undo</button>
          </div>`;
        }
        html+=`</div></div>`;

        // Improvement 6: Rename UI
        html+=`<div id="renamewrap-${ex.id}" style="display:none;margin:4px 0;">
          <div style="font-family:var(--mono);font-size:.48rem;color:#b8922a;padding:2px 0 3px;text-transform:uppercase;letter-spacing:.08em">Rename exercise (permanent for ${currentUser?currentUser.name:'you'})</div>
          <div style="display:flex;gap:4px">
            <input class="add-ex-input" style="flex:1" type="text" id="renameinput-${ex.id}" placeholder="${ex.name}" value="${globalOverride||''}">
            <button class="add-ex-confirm" onclick="doRename('${ex.id}')">✓</button>
            <button class="add-ex-confirm" style="background:#1a1a1a" onclick="clearRename('${ex.id}')">✕</button>
          </div>
        </div>`;

        if(!isDone){
          html+=`<div id="notewrap-${ex.id}" style="display:none" class="ex-note-wrap">
            <textarea class="ex-note-input" id="noteinput-${ex.id}" placeholder="Note for next time...">${existingNote}</textarea>
            <div class="ex-note-actions">
              <button class="ex-note-save" onclick="saveNote('${ex.id}')">Save Note</button>
              ${existingNote?`<button class="ex-note-clear" onclick="clearNote('${ex.id}')">Clear</button>`:''}
              <button class="ex-note-clear" onclick="toggleNote('${ex.id}')">Cancel</button>
            </div>
          </div>`;
          html+=`<div id="swapwrap-${ex.id}" style="display:none"><div style="font-family:var(--mono);font-size:.48rem;color:#555;padding:4px 0 2px;text-transform:uppercase;letter-spacing:.08em" id="swaplabel-${ex.id}"></div><select class="swap-select" id="swap-${ex.id}" onchange="doSwap('${ex.id}',this.value,'${passId}')"><option value="">— Select exercise —</option>${ALL_EXERCISES.map(e=>`<option value="${e}"${e===customName?' selected':''}>${e}</option>`).join('')}</select></div>`;
        }

        if(!isSkipped){
          // ── SET RENDERING ─────────────────────────────────────────
          // Model: extraSets array stores all sets (including work + warmup)
          // Each: {warmup:bool}. Default depends on exercise type.
          // Ramp: 3 work sets (no warmup — ramping IS the warmup)
          // BW (dead hang etc): 1 work set, no default warmup
          // Normal: 2 warmup + 1 work
          const defaultSets = ex.ramp
            ? [{warmup:false},{warmup:false},{warmup:false}]
            : ex.bw
              ? [{warmup:false}]
              : [{warmup:true},{warmup:true},{warmup:false}];
          const rawSets = draftExtraSets[ex.id] !== undefined
            ? draftExtraSets[ex.id]
            : defaultSets;
          // Sort: warmups first, work sets after — stable sort preserving relative order
          const warmupList = rawSets.map((s,i)=>({...s,origIdx:i})).filter(s=>s.warmup);
          const workList   = rawSets.map((s,i)=>({...s,origIdx:i})).filter(s=>!s.warmup);
          const sortedSets = [...warmupList, ...workList];
          const unitL = unitLabel();
          const placeholderW = prev ? (toDisplay(prev.weight)||'—') : '—';
          html+=`<div class="sets-table">`;
          // Column header for unilateral exercises
          if(isUni){
            html+=`<div class="set-row uni-set" style="margin-bottom:6px;border-bottom:1px solid #222;padding-bottom:4px;">
              <div></div>
              <div class="set-unit" style="color:#666;font-size:.42rem;">${unitLabel()}</div>
              <div class="set-unit" style="color:#666;font-size:.42rem;">reps</div>
              <div class="set-unit forced-unit" style="font-size:.42rem;">+f</div>
              <div class="set-unit" style="color:#c89030;font-size:.42rem;">side</div>
              <div></div>
            </div>`;
          }
          // Group headers
          if(warmupList.length>0){
            html+=`<div class="sets-group-label warmup-group">Warm-up</div>`;
          }
          let warmupCount=0, workCount=0, shownWorkHeader=false;
          for(let si=0; si<sortedSets.length; si++){
            const setMeta = sortedSets[si];
            const warmup  = setMeta.warmup;
            const origIdx = setMeta.origIdx; // stable index for DOM IDs & delete
            // Inject Work header before first work set
            if(!warmup && !shownWorkHeader){
              if(ex.ramp){
                html+=`<div class="sets-group-label work-group" style="border-top:none;margin-top:2px;">Sets</div>`;
              } else {
                html+=`<div class="sets-group-label work-group">Work</div>`;
              }
              shownWorkHeader=true;
            }
            const lbl   = warmup ? ('W'+(++warmupCount)) : ('S'+(++workCount));
            const wCls  = warmup ? ' warmup' : ' work-set';
            // savedData uses origIdx to read the correct saved set
            const savedSet = savedData?.sets?.[origIdx] || null;
            // Use input buffer values if available (preserves unsaved inputs when adding sets)
            const bufVal = (!savedSet && state.draft?.inputBuffer?.[ex.id]?.[origIdx]) || null;
            const dis   = (isDone||isSaved) ? 'disabled' : '';
            const canDel = !isDone && !isSaved && rawSets.length > 1;
            if(isBW){
              const snapKg   = savedSet?.bwSnap || (todayWkg||0);
              const snapDisp = toDisplay(snapKg)||'?';
              html+=`<div class="set-row bw-set">
                <span class="set-num${warmup?' warmup-label':''}">${lbl}</span>
                <div><input class="set-input${wCls}" type="number" id="bw-${ex.id}-${origIdx}" placeholder="0"
                  value="${savedSet?.extra!=null?toDisplay(savedSet.extra):bufVal?.extra!=null?toDisplay(bufVal.extra):''}"
                  min="-50" step="${unitL==='lbs'?'1':'1.25'}" ${dis}>
                  <div class="set-unit">+${unitL} (BW:${snapDisp})</div></div>
                <div><input class="${'set-input'+wCls+(isTimed?' timed':'')}" type="number" id="r-${ex.id}-${origIdx}"
                  placeholder="${isTimed?(prev?.secs||'—'):(prev?.reps||'—')}" value="${isTimed?(savedSet?.secs||''):(savedSet?.reps||'')}" min="1" ${isTimed?'max="3600"':'max="50"'} ${dis}>
                  <div class="set-unit${isTimed?' time-unit':''}">${isTimed?'sec':'reps'}</div></div>
                <div><input class="set-input${wCls} forced" type="number" id="f-${ex.id}-${origIdx}"
                  placeholder="0" value="${savedSet?.forced!=null?savedSet.forced:(bufVal?.forced||'')}" min="0" max="20" ${dis}>
                  <div class="set-unit forced-unit">+f</div></div>
                ${isUni?`<button class="side-btn ${(savedSet?.side||bufVal?.side||'')===''?'':savedSet?.side||bufVal?.side||''}" id="side-${ex.id}-${origIdx}" onclick="toggleSide('${ex.id}',${origIdx})" ${dis}>${savedSet?.side||bufVal?.side||'—'}</button>`:''}
                ${canDel?`<button class="set-delete" onclick="removeExtraSet('${ex.id}',${origIdx},'${passId}')">✕</button>`:'<div></div>'}
              </div>`;
            } else {
              const rowClass = isUni ? 'uni-set' : 'normal-set';
              html+=`<div class="set-row ${rowClass}">
                <span class="set-num${warmup?' warmup-label':''}">${lbl}</span>
                <div><input class="set-input${wCls}" type="number" id="w-${ex.id}-${origIdx}"
                  placeholder="${placeholderW}" value="${savedSet?.weight!=null?toDisplay(savedSet.weight):bufVal?.weight!=null?toDisplay(bufVal.weight):''}"
                  min="0" step="${unitL==='lbs'?'5':'2.5'}" ${dis}>
                  <div class="set-unit">${unitL}</div></div>
                <div><input class="${'set-input'+wCls+(isTimed?' timed':'')}" type="number" id="r-${ex.id}-${origIdx}"
                  placeholder="${isTimed?(prev?.secs||'—'):(prev?.reps||'—')}" value="${isTimed?(savedSet?.secs||''):(savedSet?.reps||'')}" min="1" ${isTimed?'max="3600"':'max="50"'} ${dis}>
                  <div class="set-unit${isTimed?' time-unit':''}">${isTimed?'sec':'reps'}</div></div>
                <div><input class="set-input${wCls} forced" type="number" id="f-${ex.id}-${origIdx}"
                  placeholder="0" value="${savedSet?.forced!=null?savedSet.forced:(bufVal?.forced||'')}" min="0" max="20" ${dis}>
                  <div class="set-unit forced-unit">+f</div></div>
                ${isUni?`<button class="side-btn ${(savedSet?.side||bufVal?.side||'')===''?'':savedSet?.side||bufVal?.side||''}" id="side-${ex.id}-${origIdx}" onclick="toggleSide('${ex.id}',${origIdx})" ${dis}>${savedSet?.side||bufVal?.side||'—'}</button>`:''}
                ${canDel?`<button class="set-delete" onclick="removeExtraSet('${ex.id}',${origIdx},'${passId}')">✕</button>`:'<div></div>'}
              </div>`;
            }
          }
          if(!isDone&&!isSaved){
            html+=`<button class="add-set-btn" onclick="addWorkSet('${ex.id}','${passId}')">+ Work Set</button>`;
            if(!ex.ramp){
              html+=`<button class="add-set-btn" style="border-color:#1a1400;color:#3a2a00" onclick="addWarmupSet('${ex.id}','${passId}')">+ Warm-up</button>`;
            }
          }
          html+=`</div>`;
        }
        html+=`</div>`;
      });

      // Extras
      extras.forEach((ex,i)=>{
      const exSaved=ex.saved&&!ex.editing;
      const dis=exSaved?'disabled':'';
      const unitL=unitLabel();
      if(!ex.sets||ex.sets.length===0){ex.sets=[{warmup:true,weight:null,reps:null,forced:null},{warmup:true,weight:null,reps:null,forced:null},{warmup:false,weight:null,reps:null,forced:null}];}
      const exSets=ex.sets;
      html+=`<div class="ex-block${exSaved?' saved':''}">
        <div class="ex-header-row">
          <div class="ex-label-col"><div class="ex-name">${ex.name} <span class="ex-tag" style="color:#446;border-color:#223">Extra</span></div></div>
          <div class="ex-action-col"><div class="ex-mini-btns">
            ${exSaved?`<span class="ex-saved-badge">✓</span><button class="ex-mini-btn" onclick="unsaveExtra('${passId}',${i})">Edit</button>`:`<button class="ex-mini-btn save-btn" onclick="saveExtra('${passId}',${i})">Save</button><button class="ex-mini-btn" onclick="removeExtra('${passId}',${i})">Remove</button>`}
          </div></div>
        </div>
        <div class="sets-table">`;
      exSets.forEach((s,si)=>{
        const wCls=s.warmup?' warmup':'';
        const workIdx=exSets.slice(0,si).filter(x=>!x.warmup).length;
        const lbl=s.warmup?('W'+(exSets.slice(0,si).filter(x=>x.warmup).length+1)):('S'+(workIdx+1));
        html+=`<div class="set-row normal-set">
          <span class="set-num${s.warmup?' warmup-label':''}">${lbl}</span>
          <div><input class="set-input${wCls}" type="number" id="exw-${passId}-${i}-${si}" placeholder="—" min="0" step="${unitL==='lbs'?'5':'2.5'}" value="${s.weight!=null?toDisplay(s.weight):''}" ${dis}><div class="set-unit">${unitL}</div></div>
          <div><input class="set-input${wCls}" type="number" id="exr-${passId}-${i}-${si}" placeholder="—" min="1" max="50" value="${s.reps||''}" ${dis}><div class="set-unit">reps</div></div>
          <div><input class="set-input${wCls} forced" type="number" id="exf-${passId}-${i}-${si}" placeholder="0" min="0" max="20" value="${s.forced||''}" ${dis}><div class="set-unit forced-unit">+f</div></div>
          ${!exSaved&&exSets.length>1?`<button class="set-delete" onclick="removeExtraExSet('${passId}',${i},${si})">✕</button>`:'<div></div>'}
        </div>`;
      });
      if(!exSaved){
        html+=`<button class="add-set-btn" onclick="addExtraExSet('${passId}',${i},false)">+ Work Set</button>`;
        html+=`<button class="add-set-btn" style="border-color:#1a1400;color:#3a2a00" onclick="addExtraExSet('${passId}',${i},true)">+ Warm-up</button>`;
      }
      html+=`</div></div>`;
    });

      if(!isDone){html+=`<div class="add-ex-row"><button class="add-ex-btn" id="addbtn-${passId}" onclick="showAddEx('${passId}')"><span style="font-size:.85rem">+</span> Add exercise</button><div class="add-ex-form" id="addform-${passId}" style="display:none"><input class="add-ex-input" type="text" id="addinput-${passId}" placeholder="Ab Wheel, Dragon Flag..." list="exlist"><button class="add-ex-confirm" onclick="confirmAddEx('${passId}')">+</button></div></div><datalist id="exlist">${ALL_EXERCISES.map(e=>`<option value="${e}">`).join('')}</datalist>`;}

      const savedCount=Object.values(savedExs).filter(e=>e&&!e.skipped).length+extras.filter(e=>e.saved).length;
      const skippedCount=Object.values(savedExs).filter(e=>e&&e.skipped).length;
      html+=`<div class="pass-actions">`;
      if(!isDone){html+=`<button class="btn-primary" onclick="finishPass('${passId}')" ${savedCount===0?'disabled':''}>Finish Session →</button><button class="btn-secondary" onclick="undoPass('${passId}')">↩</button>`;}
      else{html+=`<button class="btn-secondary" onclick="undoPass('${passId}')">↩ Undo</button>`;}
      html+=`</div>`;
      if(!isDone&&(savedCount>0||skippedCount>0)){html+=`<div class="draft-notice">☁ ${savedCount} saved · ${skippedCount} skipped · synced to cloud</div>`;}
    }
    html+=`</div></div>`;
  });

  html+=`</div>`;
  el.innerHTML=html;
}

// ── REORDER UI (Improvement 3) ────────────────────────────────
function buildReorderUI(effectiveChain){
  const passOrder = state.passOrder || DEFAULT_PASS_ORDER;
  const restSlots = state.restSlots || DEFAULT_REST_SLOTS;

  let html=`<div id="reorder-panel" style="display:none;border:1px solid #2a2a2a;margin:0 11px 8px;padding:12px;max-width:560px;margin-left:auto;margin-right:auto;">
    <div style="font-family:var(--mono);font-size:.52rem;color:var(--gold);text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px;">Edit Chain Order</div>
    <div style="font-family:var(--mono);font-size:.52rem;color:var(--gray-light);margin-bottom:10px;line-height:1.7;">On desktop: drag & drop. On mobile: <strong style='color:var(--white)'>hold & drag</strong> each pass to reorder.</div>
    <div id="reorder-list" style="margin-bottom:12px;">`;

  passOrder.forEach((pid,i)=>{
    const pass = BASE_PASSES.find(p=>p.id===pid);
    if(!pass)return;
    const letter = 'ABCDEF'[i]||pid;
    html+=`<div class="reorder-item" data-id="${pid}" draggable="true"
      ondragstart="dragStart(event,'${pid}')"
      ondragover="dragOver(event)"
      ondrop="dropPass(event,'${pid}')"
      ontouchstart="touchStart(event,'${pid}')"
      ontouchmove="touchMove(event)"
      ontouchend="touchEnd(event,'${pid}')"
      style="display:flex;align-items:center;gap:10px;padding:10px 12px;border:1px solid #3a3a3a;margin-bottom:6px;cursor:grab;background:#1a1a1a;touch-action:none;-webkit-user-select:none;user-select:none;">
      <span style="font-family:var(--display);font-size:1.3rem;color:var(--red);min-width:20px;">${letter}</span>
      <span style="font-family:var(--sans);font-size:.82rem;flex:1;color:var(--white);">${pass.name}</span>
      <span style="color:var(--gray-light);font-size:1.1rem;letter-spacing:2px;">⠿</span>
    </div>`;

function getAvailablePassTemplates(){
  const used=state.passOrder||DEFAULT_PASS_ORDER;
  // Also include any custom passes user added
  return PASS_TEMPLATES.filter(t=>!used.includes(t.id));
}

function togglePassRename(pid){
  const w=document.getElementById('passrenamewrap-'+pid);
  if(w) w.style.display=w.style.display==='none'?'block':'none';
}
function doPassRename(pid){
  const inp=document.getElementById('passrenameinput-'+pid);
  const val=inp?.value.trim();
  if(!val)return;
  if(!state.passNameOverrides)state.passNameOverrides={};
  state.passNameOverrides[pid]=val;
  // Update the BASE_PASSES name for rendering
  const bp=BASE_PASSES.find(p=>p.id===pid);
  if(bp) bp.name=val;
  save();
  showToast('Pass renamed ✓');
  const panel=document.getElementById('reorder-panel');
  if(panel){
    const ec=getEffectiveChain();
    const nc=buildReorderUI(ec);
    const tmp=document.createElement('div');
    tmp.innerHTML=nc;
    const np=tmp.querySelector('#reorder-panel');
    if(np){np.style.display='block';panel.replaceWith(np);}
  }
}
function addPassToChain(templateId){
  const tmpl=PASS_TEMPLATES.find(t=>t.id===templateId);
  if(!tmpl)return;
  // Add to BASE_PASSES if not there
  if(!BASE_PASSES.find(p=>p.id===templateId)){
    BASE_PASSES.push(tmpl);
  }
  const order=[...(state.passOrder||DEFAULT_PASS_ORDER)];
  order.push(templateId);
  state.passOrder=order;
  // Add to current cycle
  const cycle=curCycle();
  if(!(templateId in cycle.done)) cycle.done[templateId]=null;
  save();
  // Re-render reorder panel
  const panel=document.getElementById('reorder-panel');
  if(panel){
    const ec=getEffectiveChain();
    const nc=buildReorderUI(ec);
    const tmp=document.createElement('div');
    tmp.innerHTML=nc;
    const np=tmp.querySelector('#reorder-panel');
    if(np){np.style.display='block';panel.replaceWith(np);}
  }
  showToast('Pass added to chain ✓');
}

function removePassFromChain(passId){
  if(!confirm('Remove this pass from the chain?')) return;
  const order=[...(state.passOrder||DEFAULT_PASS_ORDER)];
  const idx=order.indexOf(passId);
  if(idx<0) return;
  order.splice(idx,1);
  state.passOrder=order;
  save();
  const panel=document.getElementById('reorder-panel');
  if(panel){
    const ec=getEffectiveChain();
    const nc=buildReorderUI(ec);
    const tmp=document.createElement('div');
    tmp.innerHTML=nc;
    const np=tmp.querySelector('#reorder-panel');
    if(np){np.style.display='block';panel.replaceWith(np);}
  }
  showToast('Pass removed ✓');
}

// Drag and drop for reordering (desktop + mobile touch)
let draggedId = null;
let touchDragId = null;
let touchDragEl = null;
let touchClone = null;

function dragStart(e, id){ draggedId=id; e.dataTransfer.effectAllowed='move'; }
function dragOver(e){ e.preventDefault(); e.dataTransfer.dropEffect='move'; }

// Touch drag support for mobile
function touchStart(e, id){
  touchDragId = id;
  touchDragEl = e.currentTarget;
  touchDragEl.style.opacity = '0.5';
  // Don't preventDefault here — let it fall through, longpress activates drag
  e.stopPropagation();
}
function touchMove(e){
  if(!touchDragId) return;
  e.preventDefault(); // now prevent scroll
  const touch = e.touches[0];
  const el = document.elementFromPoint(touch.clientX, touch.clientY);
  const target = el?.closest('.reorder-item');
  if(target && target.dataset.id && target.dataset.id !== touchDragId){
    // highlight drop target
    document.querySelectorAll('.reorder-item').forEach(i=>i.style.borderColor='#3a3a3a');
    target.style.borderColor = 'var(--red)';
  }
}
function touchEnd(e, id){
  if(!touchDragId){ return; }
  const touch = e.changedTouches[0];
  const el = document.elementFromPoint(touch.clientX, touch.clientY);
  const target = el?.closest('.reorder-item');
  if(touchDragEl) touchDragEl.style.opacity = '1';
  document.querySelectorAll('.reorder-item').forEach(i=>i.style.borderColor='#3a3a3a');
  if(target && target.dataset.id && target.dataset.id !== touchDragId){
    const fromId = touchDragId;
    const toId = target.dataset.id;
    const order = [...(state.passOrder||DEFAULT_PASS_ORDER)];
    const fromIdx = order.indexOf(fromId);
    const toIdx = order.indexOf(toId);
    if(fromIdx>=0 && toIdx>=0){
      order.splice(fromIdx,1);
      order.splice(toIdx,0,fromId);
      state.passOrder = order;
      const effectiveChain = getEffectiveChain();
      const panel = document.getElementById('reorder-panel');
      if(panel){
        const newContent = buildReorderUI(effectiveChain);
        const tmp = document.createElement('div');
        tmp.innerHTML = newContent;
        const newPanel = tmp.querySelector('#reorder-panel');
        if(newPanel){ newPanel.style.display='block'; panel.replaceWith(newPanel); }
      }
    }
  }
  touchDragId = null;
  touchDragEl = null;
}

function dropPass(e, targetId){
  e.preventDefault();
  if(!draggedId||draggedId===targetId)return;
  const order = [...(state.passOrder||DEFAULT_PASS_ORDER)];
  const fromIdx = order.indexOf(draggedId);
  const toIdx = order.indexOf(targetId);
  if(fromIdx<0||toIdx<0)return;
  order.splice(fromIdx,1);
  order.splice(toIdx,0,draggedId);
  state.passOrder = order;
  // Re-render reorder UI
  const effectiveChain = getEffectiveChain();
  const panel = document.getElementById('reorder-panel');
  if(panel){
    const newContent = buildReorderUI(effectiveChain);
    const tmp = document.createElement('div');
    tmp.innerHTML = newContent;
    const newPanel = tmp.querySelector('#reorder-panel');
    if(newPanel){ newPanel.style.display='block'; panel.replaceWith(newPanel); }
  }
}

function toggleRestSlot(pos){
  const slots = [...(state.restSlots||DEFAULT_REST_SLOTS)];
  const idx = slots.indexOf(pos);
  if(idx>=0) slots.splice(idx,1);
  else slots.push(pos);
  state.restSlots = slots.sort((a,b)=>a-b);
  // Re-render rest slot list
  const effectiveChain = getEffectiveChain();
  const panel = document.getElementById('reorder-panel');
  if(panel){
    const newContent = buildReorderUI(effectiveChain);

function saveExercise(passId,exId){
  ensureDraft(passId);

  const ex = pass.exercises.find(e=>e.id===exId);
  const isBW=!!ex.bw;

  const todayWkg=getTodayWeight();

  ensureExtraSets(exId, passId);
  const rawSets = state.draft.extraSets[exId];
  // Read values using origIdx (the DOM IDs use origIdx)
  const sets = rawSets.map((s, origIdx) => {

    if(isBW){
      const extraDisp = parseFloat(document.getElementById('bw-'+exId+'-'+origIdx)?.value);

      const repsOrSecs = parseInt(document.getElementById('r-'+exId+'-'+origIdx)?.value)||null;
      return isTimed ? {extra:extraKg, bwSnap:todayWkg||0, secs:repsOrSecs, forced, warmup}
                     : {extra:extraKg, bwSnap:todayWkg||0, reps:repsOrSecs, forced, warmup};

      const weightDisp = parseFloat(document.getElementById('w-'+exId+'-'+origIdx)?.value)||null;

                     : {weight:weightKg, reps:repsOrSecs, forced, warmup, side:sideVal};

function getDefaultSets(ex){
  if(ex.ramp) return [{warmup:false},{warmup:false},{warmup:false}];

function ensureExtraSets(exId, passId){
  ensureDraft(passId);
  const chain=getEffectiveChain();
  const pass=chain.find(p=>p.id===passId);
  const ex=pass?.exercises.find(e=>e.id===exId);
  if(state.draft.extraSets[exId]===undefined){
    state.draft.extraSets[exId] = ex ? getDefaultSets(ex) : [{warmup:false}];
  }
  // Ramp exercises must never have warmup sets — strip any
  if(ex?.ramp && state.draft.extraSets[exId].some(s=>s.warmup)){
    state.draft.extraSets[exId] = state.draft.extraSets[exId]
      .filter(s=>!s.warmup);
    if(state.draft.extraSets[exId].length===0)
      state.draft.extraSets[exId]=[{warmup:false},{warmup:false}]; // keep min 2
  }
}
function captureInputsToSetsBuffer(exId,passId){
  // Read current unsaved input values, convert to kg, stash in draft
  ensureExtraSets(exId,passId);
  const chain=getEffectiveChain();
  const pass=chain.find(p=>p.id===passId);
  const ex=pass?.exercises.find(e=>e.id===exId);
  const isBW=!!ex?.bw;
  const rawSets=state.draft.extraSets[exId];

    }

// ── PR / BEST ─────────────────────────────────────────────────
function getBest(exId,isBW,isTimed){
  let best=null;
  for(const entry of state.log){
    const ex=entry.exercises?.find(e=>e.id===exId);
    if(!ex||ex.skipped)continue;
    for(const s of(ex.sets||[])){
      if(s.warmup)continue; // only look at work sets for PR
      if(isTimed){
        if(!best||(s.secs||0)>(best.secs||0))best={...s};
      }else if(isBW){
        const t=(s.extra||0)+(s.bwSnap||0);
        if(!best||t>((best.extra||0)+(best.bwSnap||0)))best={...s};
      }else{
        if(s.weight&&(!best||s.weight>best.weight||(s.weight===best.weight&&(s.reps||0)>(best.reps||0))))best={...s};
      }
    }
  }
  return best;
}
function getLastSession(exId, isBW, isTimed){
  // Find the most recent log entry with this exercise
  for(let i=state.log.length-1; i>=0; i--){
    const entry=state.log[i];
    const ex=entry.exercises?.find(e=>e.id===exId);
    if(!ex||ex.skipped)continue;
    // Return last work sets only
    const workSets=(ex.sets||[]).filter(s=>!s.warmup);
    if(workSets.length>0) return {sets:workSets, passName:entry.passName, timestamp:entry.timestamp};
  }
  return null;
}
function getAllPRs(){const prs={};const defs=BASE_PASSES.flatMap(p=>p.exercises).map(e=>({id:e.id,name:e.name,bw:!!e.bw}));for(const entry of state.log){for(const ex of(entry.exercises||[])){if(ex.skipped||ex.extra)continue;const def=defs.find(d=>d.id===ex.id);const isBW=def?.bw;for(const s of(ex.sets||[])){if(isBW){const t=(s.extra||0)+(s.bwSnap||0);const cur=prs[ex.id];if(!cur||t>((cur.extra||0)+(cur.bwSnap||0)))prs[ex.id]={name:ex.name,extra:s.extra||0,bwSnap:s.bwSnap||0,reps:s.reps,bw:true};}else{if(!s.weight)continue;const cur=prs[ex.id];if(!cur||s.weight>cur.weight||(s.weight===cur.weight&&(s.reps||0)>(cur.reps||0)))prs[ex.id]={name:ex.name,weight:s.weight,reps:s.reps,bw:false};}}}}return Object.values(prs);}

function drawChart(data){

  const p={t:16,r:12,b:32,l:42};const cw=W-p.l-p.r;const ch=H-p.t-p.b;
  ctx.clearRect(0,0,W,H);ctx.strokeStyle='#1a1a1a';ctx.lineWidth=1;
  for(let i=0;i<=4;i++){const y=p.t+ch*(i/4);ctx.beginPath();ctx.moveTo(p.l,y);ctx.lineTo(p.l+cw,y);ctx.stroke();ctx.fillStyle='#333';ctx.font='9px DM Mono,monospace';ctx.textAlign='right';ctx.fillText((mx-(mx-mn)*(i/4)).toFixed(1),p.l-3,y+3);}
  if(data.length<2){ctx.beginPath();ctx.arc(p.l+cw/2,p.t+ch/2,3,0,Math.PI*2);ctx.fillStyle='#c0392b';ctx.fill();return;}
  const pts=data.map((d,i)=>({x:p.l+cw*(i/(data.length-1)),y:p.t+ch*(1-(d.weight-mn)/(mx-mn))}));
  ctx.beginPath();ctx.moveTo(pts[0].x,p.t+ch);pts.forEach(pt=>ctx.lineTo(pt.x,pt.y));ctx.lineTo(pts[pts.length-1].x,p.t+ch);ctx.closePath();
  const g=ctx.createLinearGradient(0,p.t,0,p.t+ch);g.addColorStop(0,'rgba(192,57,43,.2)');g.addColorStop(1,'rgba(192,57,43,0)');ctx.fillStyle=g;ctx.fill();
  ctx.beginPath();pts.forEach((pt,i)=>i===0?ctx.moveTo(pt.x,pt.y):ctx.lineTo(pt.x,pt.y));ctx.strokeStyle='#c0392b';ctx.lineWidth=2;ctx.stroke();
  pts.forEach((pt,i)=>{ctx.beginPath();ctx.arc(pt.x,pt.y,2.5,0,Math.PI*2);ctx.fillStyle='#c0392b';ctx.fill();if(data.length<=8||i%(Math.ceil(data.length/6))===0){ctx.fillStyle='#333';ctx.font='9px DM Mono,monospace';ctx.textAlign='center';ctx.fillText(labels[i],pt.x,H-p.b+12);}});
}
function deleteWeight(date){state.weightLog=state.weightLog.filter(e=>e.date!==date);save();renderWeight();}

// ── DATA VIEW ─────────────────────────────────────────────────
function renderData(){
  const el=document.getElementById('view-data');const size=(JSON.stringify(state).length/1024).toFixed(1);
  const unitBtn=(u)=>`<button onclick="state.unit='${u}';save();renderData();renderChain();" style="flex:1;background:${state.unit===u?'var(--red)':'none'};border:1px solid ${state.unit===u?'var(--red)':'#2a2a2a'};color:${state.unit===u?'var(--white)':'#666'};font-family:var(--mono);font-size:.54rem;letter-spacing:.07em;text-transform:uppercase;padding:8px;cursor:pointer;">${u.toUpperCase()}</button>`;
  el.innerHTML=`<div class="section-title">Data</div>
  <div style="font-family:var(--mono);font-size:.58rem;color:#444;margin-bottom:18px">Supabase · ${currentUser?.name} · ${size} KB · ${state.log.length} sessions</div>
  <div class="section-sub">Rest Timer</div>
  <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 0;border:1px solid #2a2a2a;padding:10px 12px;margin-bottom:10px;">
    <div>
      <div style="font-family:var(--sans);font-size:.82rem;color:var(--white);margin-bottom:2px;">Rest Timer</div>
      <div style="font-family:var(--mono);font-size:.5rem;color:#888;">Counts down after each Done. Slide-up popup.</div>
    </div>
    <button onclick="state.timerEnabled=!state.timerEnabled;save();renderData();" style="background:${state.timerEnabled?'var(--green-bright)':'#1a1a1a'};border:1px solid ${state.timerEnabled?'var(--green-bright)':'#444'};color:${state.timerEnabled?'var(--black)':'#888'};font-family:var(--mono);font-size:.54rem;font-weight:500;letter-spacing:.06em;text-transform:uppercase;padding:7px 16px;cursor:pointer;transition:all .2s;">${state.timerEnabled?'ON':'OFF'}</button>
  </div>
  <div style="font-family:var(--mono);font-size:.52rem;color:var(--gray-light);margin-bottom:8px;">Rest duration</div>
  <div style="display:flex;gap:6px;margin-bottom:18px;flex-wrap:wrap;">${[60,90,120,180,240,300].map(s=>`<button onclick="state.timerDefault=${s};save();renderData();" style="background:${state.timerDefault===s?'var(--red)':'none'};border:1px solid ${state.timerDefault===s?'var(--red)':'#444'};color:${state.timerDefault===s?'var(--white)':'#888'};font-family:var(--mono);font-size:.5rem;padding:6px 10px;cursor:pointer;transition:all .15s;">${s<60?s+'s':Math.floor(s/60)+(s%60?':'+String(s%60).padStart(2,'0'):'')+' min'}</button>`).join('')}</div>
  <div class="section-sub">Weight Unit</div>
  <div style="font-family:var(--mono);font-size:.54rem;color:var(--gray-light);margin-bottom:8px;">Currently: <strong style="color:var(--white)">${(state.unit||'kg').toUpperCase()}</strong></div>
  <div style="display:flex;gap:6px;margin-bottom:18px">${unitBtn('kg')}${unitBtn('lbs')}</div>
  <div class="section-sub">Backup</div>
  <div style="font-family:var(--mono);font-size:.58rem;color:var(--gray-light);line-height:1.8;margin-bottom:10px">Export all data as JSON. Import to restore.</div>
  <div class="data-row"><button class="data-btn" onclick="exportData()">↓ Export JSON</button><button class="data-btn" onclick="document.getElementById('importFile').click()">↑ Import JSON</button></div>
  <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(event)">
  <div class="section-sub" style="margin-top:24px">Reset</div>
  <div class="data-row"><button class="data-btn danger" onclick="resetAll()">✕ Reset all data</button></div>`;
}
function exportData(){const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`thechain-${currentUser?.id}-${todayStr()}.json`;a.click();showToast('Export done!');}
function importData(e){const file=e.target.files[0];if(!file)return;const reader=new FileReader();reader.onload=ev=>{try{const d=JSON.parse(ev.target.result);if(!d.cycles||!d.log)throw new Error('Invalid file');state=d;if(!state.unit)state.unit='kg';if(!state.exerciseOverrides)state.exerciseOverrides={};save();showToast('Data imported!');renderChain();}catch{showToast('Error: invalid file');}};reader.readAsText(file);}
function resetAll(){if(!confirm('Reset ALL data for '+currentUser?.name+'? Cannot be undone.'))return;state={cycles:[newCycle()],log:[],weightLog:[],draft:null,restCount:1,permanentSwaps:{},passOrder:state.passOrder,restSlots:state.restSlots,unit:state.unit||'kg',exerciseOverrides:{}};save();showToast('Data reset');renderChain();}

// ── REST TIMER ────────────────────────────────────────────────
let timerInterval=null;
let timerSeconds=0;
let timerEndTime=0;
let timerDefault=120; // 2 minutes default

function ensureTimerEl(){
  let el=document.getElementById('restTimer');
  if(!el){
    el=document.createElement('div');
    el.id='restTimer';
    el.className='rest-timer';
    el.innerHTML=`<span id="timerDisplay"></span>
      <div style="display:flex;flex-direction:column;gap:3px;">
        <button class="timer-btn" onclick="stopTimer()">✕</button>
        <button class="timer-btn" onclick="addTimerTime(30)">+30s</button>
      </div>`;
    document.body.appendChild(el);
  }
  return el;
}
function startRestTimer(secs){
  const dur=secs||(state.timerDefault||120);
  // Use absolute end time — survives tab-out/focus loss
  timerEndTime=Date.now()+dur*1000;
  const el=ensureTimerEl();
  if(timerInterval)clearInterval(timerInterval);
  el.className='rest-timer show';
  updateTimerDisplay();
  timerInterval=setInterval(()=>{
    const remaining=Math.ceil((timerEndTime-Date.now())/1000);
    timerSeconds=remaining;
    updateTimerDisplay();
    if(remaining<=10&&remaining>0) el.className='rest-timer show warning';
    if(remaining<=0){
      clearInterval(timerInterval);
      el.className='rest-timer show done';
      if('Notification' in window && Notification.permission==='granted'){
        new Notification('The Chain',{body:'Rest over — next set!',icon:'/favicon.ico'});
      }
      if(navigator.vibrate) navigator.vibrate([200,100,200]);
      setTimeout(()=>stopTimer(),3000);
    }
  },500); // poll every 500ms for accuracy after tab return
}
function updateTimerDisplay(){
  const disp=document.getElementById('timerDisplay');
  if(!disp)return;
  const m=Math.floor(Math.abs(timerSeconds)/60);
  const s=Math.abs(timerSeconds)%60;
  disp.textContent=(timerSeconds<0?'-':'')+(m>0?m+':':'')+(s<10&&m>0?'0':'')+s+(m===0?'s':'');
}
function addTimerTime(secs){
  timerEndTime+=secs*1000;
  timerSeconds=Math.ceil((timerEndTime-Date.now())/1000);
  const el=document.getElementById('restTimer');
  if(el)el.className='rest-timer show'; // reset warning/done state
  updateTimerDisplay();
}
function stopTimer(){
  if(timerInterval)clearInterval(timerInterval);
  timerInterval=null;
  const el=document.getElementById('restTimer');
  if(el){el.className='rest-timer';} // slides back down, not visible
}
function requestNotificationPermission(){
  if('Notification' in window && Notification.permission==='default'){
    Notification.requestPermission();
  }
}

// ── UTILS ─────────────────────────────────────────────────────
function fmtDate(ts){return new Date(ts).toLocaleDateString('en-GB',{weekday:'short',month:'short',day:'numeric'});}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2400);}

</script>
