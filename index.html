<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mentzer 3.0 — Kedjan</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --black:#0a0a0a;--white:#f5f0e8;--red:#c0392b;
  --gold:#b8922a;--green:#2a6a3a;--green-bright:#3a9a5a;
  --gray-mid:#444;--gray-light:#888;
  --mono:'DM Mono',monospace;--sans:'DM Sans',sans-serif;--display:'Bebas Neue',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--black);color:var(--white);font-family:var(--sans);min-height:100vh;overflow-x:hidden;}

/* SYNC INDICATOR */
.sync-dot{width:6px;height:6px;border-radius:50%;background:#333;display:inline-block;margin-left:6px;vertical-align:middle;transition:background .3s;}
.sync-dot.syncing{background:#b8922a;animation:pulse .8s infinite;}
.sync-dot.ok{background:#3a9a5a;}
.sync-dot.err{background:var(--red);}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}

header{border-bottom:1px solid #1e1e1e;padding:13px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--black);z-index:100;}
.logo{font-family:var(--display);font-size:1.65rem;letter-spacing:.08em;}
.logo span{color:var(--red);}
.header-right{display:flex;flex-direction:column;align-items:flex-end;gap:2px;}
.header-sub{font-family:var(--mono);font-size:.56rem;color:var(--gray-light);letter-spacing:.1em;text-transform:uppercase;}

nav{display:flex;border-bottom:1px solid #1e1e1e;}
nav button{flex:1;background:none;border:none;border-right:1px solid #1e1e1e;color:var(--gray-light);font-family:var(--mono);font-size:.54rem;letter-spacing:.07em;text-transform:uppercase;padding:10px 2px;cursor:pointer;transition:all .15s;}
nav button:last-child{border-right:none;}
nav button.active{color:var(--white);background:#111;border-bottom:2px solid var(--red);}
nav button:hover:not(.active){color:var(--white);background:#0f0f0f;}

.view{display:none;}
.view.active{display:block;}

/* LOADING SCREEN */
.loading-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:16px;}
.loading-title{font-family:var(--display);font-size:2rem;letter-spacing:.08em;color:var(--red);}
.loading-sub{font-family:var(--mono);font-size:.62rem;color:var(--gray-light);letter-spacing:.1em;text-transform:uppercase;}
.spinner{width:28px;height:28px;border:2px solid #222;border-top-color:var(--red);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* WEIGHT BANNER */
.weight-banner{display:flex;align-items:center;gap:8px;padding:9px 14px;border-bottom:1px solid #1a1a1a;background:#0d0d0d;flex-wrap:wrap;}
.weight-banner-label{font-family:var(--mono);font-size:.52rem;color:var(--gray-light);text-transform:uppercase;letter-spacing:.1em;white-space:nowrap;}
.weight-input{background:#111;border:1px solid #2a2a2a;color:var(--white);font-family:var(--mono);font-size:.86rem;padding:5px 8px;width:72px;transition:border-color .15s;-moz-appearance:textfield;}
.weight-input::-webkit-outer-spin-button,.weight-input::-webkit-inner-spin-button{-webkit-appearance:none;}
.weight-input:focus{outline:none;border-color:var(--red);}
.weight-unit{font-family:var(--mono);font-size:.54rem;color:#444;text-transform:uppercase;}
.weight-log-btn{background:none;border:1px solid #2a2a2a;color:var(--gray-light);font-family:var(--mono);font-size:.52rem;letter-spacing:.07em;text-transform:uppercase;padding:5px 10px;cursor:pointer;transition:all .15s;white-space:nowrap;}
.weight-log-btn:hover{border-color:var(--red);color:var(--white);}
.weight-today{font-family:var(--mono);font-size:.58rem;color:var(--red);white-space:nowrap;margin-left:auto;}

/* CHAIN */
.chain-intro{padding:13px 15px 10px;border-bottom:1px solid #1a1a1a;display:flex;align-items:center;justify-content:space-between;}
.chain-intro-title{font-family:var(--display);font-size:1.75rem;letter-spacing:.06em;}
.chain-intro-sub{font-family:var(--mono);font-size:.54rem;color:var(--gray-light);letter-spacing:.07em;margin-top:3px;}
.chain-bar{height:3px;background:#1a1a1a;}
.chain-fill{height:100%;background:var(--red);transition:width .4s;}
.chain-list{padding:10px 12px 80px;}

.pass-card{border:1px solid #1e1e1e;margin-bottom:8px;position:relative;overflow:hidden;}
.pass-card.next-up{border-color:var(--red);}
.pass-card.next-up::before{content:'NÄSTA';position:absolute;top:0;right:0;background:var(--red);color:var(--white);font-family:var(--mono);font-size:.44rem;letter-spacing:.12em;padding:2px 7px;}
.pass-card.in-progress{border-color:#2a3a2a;}
.pass-card.in-progress::before{content:'PÅGÅR';position:absolute;top:0;right:0;background:#1a3a1a;color:var(--green-bright);font-family:var(--mono);font-size:.44rem;letter-spacing:.12em;padding:2px 7px;}
.pass-card.done{border-color:#191919;opacity:.42;}
.pass-card.rest-day{border-style:dashed;border-color:#222;}

.pass-top{display:flex;align-items:center;padding:11px 13px;gap:11px;cursor:pointer;user-select:none;}
.pass-letter{font-family:var(--display);font-size:2rem;line-height:1;color:var(--red);min-width:24px;}
.pass-card.done .pass-letter{color:#2a2a2a;}
.pass-card.rest-day .pass-letter{color:#3a3a3a;}
.pass-info{flex:1;}
.pass-name{font-family:var(--display);font-size:1.05rem;letter-spacing:.05em;}
.pass-card.done .pass-name{color:#2a2a2a;}
.pass-preview{font-family:var(--mono);font-size:.5rem;color:var(--gray-light);letter-spacing:.04em;margin-top:2px;}
.pass-card.done .pass-preview{color:#222;}
.pass-done-info{font-family:var(--mono);font-size:.52rem;color:#363636;text-align:right;white-space:nowrap;}

.pass-body{display:none;border-top:1px solid #181818;padding:0 12px 12px;}
.pass-card.open .pass-body{display:block;}

.ex-block{border-bottom:1px solid #141414;padding:8px 0 6px;}
.ex-block:last-of-type{border-bottom:none;}
.ex-block.skipped{opacity:.28;}
.ex-block.saved{background:#0a120a;}
.ex-header-row{display:flex;align-items:flex-start;justify-content:space-between;gap:6px;}
.ex-label-col{flex:1;min-width:0;}
.ex-name{font-size:.82rem;font-weight:500;}
.ex-tag{display:inline-block;font-family:var(--mono);font-size:.44rem;letter-spacing:.09em;text-transform:uppercase;padding:1px 5px;border:1px solid #333;color:#555;margin-left:4px;vertical-align:middle;}
.ex-tag.ramp{border-color:#3a2a00;color:var(--gold);}
.ex-tag.singel{border-color:#2a1a1a;color:#c07060;}
.ex-tag.bw{border-color:#1a2a1a;color:#5a9a5a;}
.ex-detail{font-family:var(--mono);font-size:.51rem;color:var(--gray-light);margin-top:2px;}
.ex-prev{font-family:var(--mono);font-size:.49rem;color:#383838;margin-top:2px;}
.ex-prev span{color:#565656;}
.ex-action-col{display:flex;flex-direction:column;align-items:flex-end;gap:3px;padding-top:1px;flex-shrink:0;}
.ex-mini-btns{display:flex;gap:3px;flex-wrap:wrap;justify-content:flex-end;}
.ex-mini-btn{background:none;border:1px solid #1e1e1e;color:#3a3a3a;font-family:var(--mono);font-size:.44rem;letter-spacing:.05em;padding:3px 6px;cursor:pointer;text-transform:uppercase;transition:all .15s;white-space:nowrap;}
.ex-mini-btn:hover{border-color:#555;color:var(--gray-light);}
.ex-mini-btn.save-btn{border-color:#1a3a1a;color:#3a7a3a;}
.ex-mini-btn.save-btn:hover{border-color:var(--green-bright);color:var(--green-bright);}
.ex-saved-badge{font-family:var(--mono);font-size:.44rem;color:var(--green-bright);letter-spacing:.08em;}

.sets-table{margin-top:6px;width:100%;}
.set-row{display:grid;align-items:center;gap:4px;margin-bottom:4px;}
.set-row.normal-set{grid-template-columns:auto 1fr 1fr 1fr auto;}
.set-row.bw-set{grid-template-columns:auto 1fr 1fr 1fr auto;}
.set-num{font-family:var(--mono);font-size:.5rem;color:#3a3a3a;text-transform:uppercase;letter-spacing:.06em;white-space:nowrap;}
.set-num.warmup-label{color:#2a2a2a;}
.set-input{background:#111;border:1px solid #222;color:var(--white);font-family:var(--mono);font-size:.76rem;padding:5px 5px;text-align:center;transition:border-color .15s;-moz-appearance:textfield;width:100%;}
.set-input::-webkit-outer-spin-button,.set-input::-webkit-inner-spin-button{-webkit-appearance:none;}
.set-input:focus{outline:none;border-color:var(--red);}
.set-input:disabled{opacity:.2;cursor:not-allowed;}
.set-input.warmup{border-color:#181818;color:#3a3a3a;}
.set-unit{font-family:var(--mono);font-size:.46rem;color:#333;text-transform:uppercase;text-align:center;margin-top:1px;}
.set-input.forced{border-color:#2a1a2a;color:#9a6a9a;}
.set-unit.forced-unit{color:#5a3a5a;}
.set-delete{background:none;border:none;color:#252525;font-size:.7rem;cursor:pointer;padding:0 2px;transition:color .15s;line-height:1;}
.set-delete:hover{color:var(--red);}
.bw-snap{font-family:var(--mono);font-size:.5rem;color:#3a3a3a;text-align:center;padding:1px 0 2px;}

.add-set-btn{background:none;border:1px dashed #1c1c1c;color:#333;font-family:var(--mono);font-size:.46rem;letter-spacing:.07em;text-transform:uppercase;padding:4px;width:100%;cursor:pointer;transition:all .15s;margin-top:2px;display:flex;align-items:center;justify-content:center;gap:3px;}
.add-set-btn:hover{border-color:var(--red);color:#777;}

.swap-select{background:#111;border:1px solid #2a2a2a;color:var(--white);font-family:var(--mono);font-size:.56rem;padding:4px 6px;width:100%;margin-top:4px;cursor:pointer;}
.swap-select:focus{outline:none;border-color:var(--red);}
.swap-select option{background:#111;}

.add-ex-row{padding:6px 0 0;}
.add-ex-btn{background:none;border:1px dashed #1c1c1c;color:#333;font-family:var(--mono);font-size:.5rem;letter-spacing:.07em;text-transform:uppercase;padding:7px;width:100%;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:4px;}
.add-ex-btn:hover{border-color:var(--red);color:#777;}
.add-ex-form{margin-top:5px;display:flex;gap:4px;align-items:center;}
.add-ex-input{flex:1;background:#111;border:1px solid #2a2a2a;color:var(--white);font-family:var(--mono);font-size:.68rem;padding:6px 8px;}
.add-ex-input:focus{outline:none;border-color:var(--red);}
.add-ex-confirm{background:var(--red);border:none;color:var(--white);font-family:var(--mono);font-size:.52rem;letter-spacing:.06em;text-transform:uppercase;padding:6px 10px;cursor:pointer;}

.rest-content{padding:10px 0 3px;font-family:var(--mono);font-size:.64rem;color:#484848;line-height:1.8;}
.pass-actions{display:flex;gap:6px;margin-top:10px;}
.btn-primary{flex:1;background:var(--red);border:none;color:var(--white);font-family:var(--display);font-size:.95rem;letter-spacing:.1em;padding:10px;cursor:pointer;transition:background .15s;}
.btn-primary:hover{background:#a83226;}
.btn-primary:disabled{background:#3a1a1a;color:#5a3a3a;cursor:not-allowed;}
.btn-secondary{background:none;border:1px solid #2a2a2a;color:#484848;font-family:var(--mono);font-size:.52rem;letter-spacing:.06em;padding:0 10px;cursor:pointer;text-transform:uppercase;transition:all .15s;}
.btn-secondary:hover{border-color:#555;color:var(--gray-light);}
.btn-ghost{flex:1;background:none;border:1px solid #242424;color:#484848;font-family:var(--display);font-size:.95rem;letter-spacing:.1em;padding:10px;cursor:pointer;transition:all .15s;}
.btn-ghost:hover{border-color:#444;color:#777;}
.draft-notice{font-family:var(--mono);font-size:.52rem;color:#2a4a2a;text-align:center;padding:6px;border:1px solid #1a2a1a;margin-top:8px;}

.cycle-done{padding:44px 20px;text-align:center;}
.cycle-done-title{font-family:var(--display);font-size:2.6rem;color:var(--red);letter-spacing:.06em;margin-bottom:8px;}
.cycle-done-sub{font-family:var(--mono);font-size:.62rem;color:var(--gray-light);letter-spacing:.08em;margin-bottom:28px;line-height:1.8;}

#view-progress,#view-weight,#view-data{padding:14px 12px 60px;max-width:640px;margin:0 auto;}
.section-title{font-family:var(--display);font-size:1.85rem;letter-spacing:.06em;margin-bottom:14px;}
.section-sub{font-family:var(--mono);font-size:.55rem;color:var(--gray-light);text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px;margin-top:20px;}
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:18px;}
.stat-box{border:1px solid #1e1e1e;padding:12px 10px;}
.stat-num{font-family:var(--display);font-size:2rem;color:var(--red);line-height:1;}
.stat-desc{font-family:var(--mono);font-size:.46rem;color:var(--gray-light);text-transform:uppercase;letter-spacing:.07em;margin-top:3px;}

.pr-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:6px;}
.pr-card{border:1px solid #1e1e1e;padding:9px 11px;position:relative;overflow:hidden;}
.pr-card::before{content:'PR';position:absolute;top:0;right:0;background:#1a1400;color:var(--gold);font-family:var(--mono);font-size:.42rem;letter-spacing:.12em;padding:2px 5px;}
.pr-ex-name{font-size:.72rem;font-weight:500;margin-bottom:2px;margin-right:18px;}
.pr-value{font-family:var(--display);font-size:1.4rem;color:var(--gold);line-height:1;}
.pr-sub{font-family:var(--mono);font-size:.46rem;color:#4a4a4a;margin-top:2px;}

.hist-entry{border:1px solid #1a1a1a;margin-bottom:6px;}
.hist-header{padding:9px 11px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;}
.hist-date{font-family:var(--display);font-size:.95rem;letter-spacing:.04em;}
.hist-pass{font-family:var(--mono);font-size:.5rem;color:var(--red);text-transform:uppercase;letter-spacing:.08em;margin-top:1px;}
.hist-body{display:none;border-top:1px solid #161616;padding:0 11px 10px;}
.hist-entry.open .hist-body{display:block;}
.hist-ex{font-family:var(--mono);font-size:.58rem;padding:5px 0;border-bottom:1px solid #131313;}
.hist-ex:last-child{border-bottom:none;}
.hist-ex-header{display:flex;justify-content:space-between;color:var(--gray-light);}
.hist-ex-header strong{color:var(--white);}
.hist-set{font-size:.52rem;color:#333;padding:1px 0 1px 10px;}

.weight-chart-wrap{border:1px solid #1e1e1e;padding:13px;margin-bottom:18px;}
canvas#weightChart{width:100%!important;display:block;}
.wlog-list{margin-top:5px;}
.wlog-row{font-family:var(--mono);font-size:.61rem;padding:6px 0;border-bottom:1px solid #131313;display:flex;justify-content:space-between;align-items:center;color:var(--gray-light);}
.wlog-row:last-child{border-bottom:none;}
.wlog-row strong{color:var(--white);font-size:.74rem;}
.wlog-delete{background:none;border:none;color:#282828;cursor:pointer;font-size:.72rem;padding:0 2px;transition:color .15s;}
.wlog-delete:hover{color:var(--red);}

.data-row{display:flex;gap:6px;margin-top:10px;}
.data-btn{flex:1;background:none;border:1px solid #2a2a2a;color:#666;font-family:var(--mono);font-size:.54rem;letter-spacing:.07em;text-transform:uppercase;padding:8px;cursor:pointer;transition:all .15s;}
.data-btn:hover{border-color:#555;color:var(--white);}
.data-btn.danger:hover{border-color:var(--red);color:var(--red);}

.empty-state{text-align:center;padding:44px 16px;font-family:var(--mono);font-size:.6rem;color:#2a2a2a;text-transform:uppercase;letter-spacing:.1em;line-height:2.2;}
.toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%) translateY(70px);background:var(--red);color:var(--white);font-family:var(--mono);font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;padding:8px 16px;transition:transform .3s cubic-bezier(.34,1.56,.64,1);z-index:999;pointer-events:none;white-space:nowrap;}
.toast.show{transform:translateX(-50%) translateY(0);}

@media(max-width:400px){
  .stats-grid{grid-template-columns:1fr 1fr;}
  .pr-grid{grid-template-columns:1fr;}
}
</style>
</head>

<header>

    <div class="logo">MENTZER <span>3.0</span></div>

<script>

const SB_URL='https://qjmjqideqrgozexudaqr.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFqbWpxaWRlcXJnb3pleHVkYXFyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwOTIwODQsImV4cCI6MjA5MTY2ODA4NH0.byRwDswpbfMWDoln4n7Opp0ntrNis_du4EnLVMFuIp8';
const HEADERS={'Content-Type':'application/json','apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Prefer':'resolution=merge-duplicates'};

async function sbGet(table,query=''){

  if(!r.ok)throw new Error(await r.text());
  return r.json();
}
async function sbUpsert(table,data){
  const r=await fetch(SB_URL+'/rest/v1/'+table,{method:'POST',headers:{...HEADERS,'Prefer':'resolution=merge-duplicates'},body:JSON.stringify(data)});

}

const CHAIN=[
  {id:'A',name:'Bröst + Tri',exercises:[

    {id:'B3',name:'Deadlift / Rack Pull',detail:'1–2 tunga singlar',singel:true},
    {id:'B4',name:'Lat Prayers',detail:'1 set failure'},
  ]},
  {id:'C',name:'Ben + Vader',exercises:[
    {id:'C1',name:'Zercher Squat',detail:'Ramping → 1 set failure',ramp:true},

// ══════ STATE ══════════════════════════════════════════════════
// Local cache — synced to/from Supabase
let state={cycles:[newCycle()],log:[],weightLog:[],draft:null};

function newCycle(){const c={id:Date.now(),done:{}};CHAIN.forEach(p=>c.done[p.id]=null);return c;}
function curCycle(){return state.cycles[state.cycles.length-1];}
function nextPassId(){const c=curCycle();for(const p of CHAIN){if(c.done[p.id]===null)return p.id;}return null;}

function ensureDraft(passId){
  if(!state.draft||state.draft.passId!==passId){
    state.draft={passId,savedExercises:{},extras:[],swaps:{},extraSets:{}};
  }
}

// ══════ SUPABASE SYNC ══════════════════════════════════════════
let saveTimer=null;
function scheduleSave(){
  clearTimeout(saveTimer);
  saveTimer=setTimeout(pushState,800);
}

async function pushState(){
  setSyncDot('syncing');
  try{
    await sbUpsert('app_state',{id:'main',data:state,updated_at:new Date().toISOString()});
    setSyncDot('ok');
    setTimeout(()=>setSyncDot(''),3000);
  }catch(e){
    console.error('Sync error:',e);
    setSyncDot('err');
    // Fallback to localStorage
    try{localStorage.setItem('m30_backup',JSON.stringify(state));}catch{}
  }
}

async function loadState(){
  setSyncDot('syncing');
  try{
    const rows=await sbGet('app_state','id=eq.main&select=data');
    if(rows&&rows.length&&rows[0].data){
      state=rows[0].data;
      // Ensure structure
      if(!state.cycles)state.cycles=[newCycle()];
      if(!state.log)state.log=[];
      if(!state.weightLog)state.weightLog=[];
      if(!state.draft)state.draft=null;
    }
    setSyncDot('ok');
    setTimeout(()=>setSyncDot(''),3000);
  }catch(e){
    console.error('Load error:',e);
    setSyncDot('err');
    // Try localStorage backup
    try{
      const bk=localStorage.getItem('m30_backup');
      if(bk)state=JSON.parse(bk);
    }catch{}
  }
}

function save(){
  // Update local backup immediately
  try{localStorage.setItem('m30_backup',JSON.stringify(state));}catch{}
  scheduleSave();
}

// ══════ NAV ════════════════════════════════════════════════════
function showView(name,btn){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b=>b.classList.remove('active'));
  document.getElementById('view-'+name).classList.add('active');
  if(btn)btn.classList.add('active');
  if(name==='progress')renderProgress();
  if(name==='weight')renderWeight();
  if(name==='data')renderData();
}

// ══════ WEIGHT ═════════════════════════════════════════════════
function todayStr(){return new Date().toLocaleDateString('sv-SE',{year:'numeric',month:'2-digit',day:'2-digit'});}
function getTodayWeight(){return(state.weightLog.find(e=>e.date===todayStr())||{}).weight||null;}
function logWeight(){
  const inp=document.getElementById('morningWeight');
  const val=parseFloat(inp.value);
  if(!val||val<20||val>300){showToast('Ange en rimlig vikt!');return;}
  const today=todayStr();
  const idx=state.weightLog.findIndex(e=>e.date===today);
  if(idx>=0)state.weightLog[idx].weight=val;
  else state.weightLog.push({date:today,weight:val});
  save();showToast(val+' kg loggat ✓');
  const el=document.getElementById('weightBannerToday');
  if(el)el.textContent=val+' kg idag';
}

// ══════ CHAIN RENDER ═══════════════════════════════════════════
function renderChain(){
  const el=document.getElementById('view-chain');
  const cycle=curCycle();
  const nextId=nextPassId();
  const totalPasses=CHAIN.filter(p=>!p.rest).length;
  const donePasses=CHAIN.filter(p=>!p.rest&&cycle.done[p.id]!==null).length;
  const pct=Math.round(donePasses/totalPasses*100);
  const todayW=getTodayWeight();
  document.getElementById('hdr-info').textContent=state.log.length?state.log.length+' pass':'';

  if(!nextId){
    el.innerHTML=`<div class="cycle-done"><div class="cycle-done-title">KEDJAN KLAR</div><div class="cycle-done-sub">Du har genomfört hela A → F → V.<br>Ny runda väntar.</div><button class="btn-primary" style="display:inline-block;padding:14px 36px;font-size:1.2rem" onclick="doNewCycle()">Starta ny runda →</button></div>`;
    return;
  }

  let html=`
  <div class="weight-banner">
    <span class="weight-banner-label">Morgonvikt</span>
    <div style="display:flex;align-items:center;gap:4px">
      <input class="weight-input" type="number" id="morningWeight" placeholder="75.0" step="0.1" min="20" max="300" value="${todayW||''}">
      <span class="weight-unit">kg</span>
    </div>
    <span id="weightBannerToday" class="weight-today">${todayW?todayW+' kg idag':''}</span>
    <button class="weight-log-btn" onclick="logWeight()">Logga</button>
  </div>
  <div class="chain-intro">
    <div>
      <div class="chain-intro-title">Kedjan</div>
      <div class="chain-intro-sub">${donePasses}/${totalPasses} pass klara · Runda ${state.cycles.length}</div>
    </div>
    <div style="font-family:var(--mono);font-size:.54rem;color:var(--gray-mid)">${pct}%</div>
  </div>
  <div class="chain-bar"><div class="chain-fill" style="width:${pct}%"></div></div>
  <div class="chain-list">`;

  CHAIN.forEach(pass=>{
    const isDone=cycle.done[pass.id]!==null;
    const isNext=pass.id===nextId;
    const isRest=!!pass.rest;
    const hasDraft=state.draft&&state.draft.passId===pass.id;
    const inProgress=hasDraft&&Object.keys(state.draft.savedExercises).length>0;
    const completedData=isDone?cycle.done[pass.id]:null;

    let cls='pass-card';
    if(isDone)cls+=' done';
    else if(inProgress)cls+=' in-progress';
    else if(isNext)cls+=' next-up';
    if(isRest)cls+=' rest-day';
    const preview=isRest?'Vila · Dead hang · Promenad':pass.exercises.map(e=>e.name.split('/')[0].trim()).join(' · ');

    html+=`<div class="${cls}" id="card-${pass.id}">
      <div class="pass-top" onclick="toggleCard('${pass.id}')">
        <div class="pass-letter">${pass.id}</div>
        <div class="pass-info">
          <div class="pass-name">${pass.name}</div>
          <div class="pass-preview">${preview}</div>
        </div>
        <div class="pass-done-info">${isDone?'✓ '+(completedData?.date||''):inProgress?'↓ utkast':''}</div>
      </div>
      <div class="pass-body">`;

    if(isRest){
      html+=`<div class="rest-content">Aktiv vila. Lätt promenad eller dead hang hemma.<br>Inga tunga lyft — återhämtning ÄR träning.</div>
      <div class="pass-actions">
        ${isDone?`<button class="btn-ghost" onclick="undoPass('${pass.id}')">↩ Ångra</button>`:`<button class="btn-ghost" onclick="doneRest()">Markera vila klar →</button>`}
      </div>`;
    } else {
      const draft=hasDraft?state.draft:null;
      const savedExs=draft?draft.savedExercises:{};
      const draftSwaps=draft?draft.swaps:{};
      const draftExtraSets=draft?draft.extraSets:{};
      const extras=draft?draft.extras:[];

      pass.exercises.forEach(ex=>{
        const isSaved=!isDone&&!!savedExs[ex.id]&&!savedExs[ex.id].skipped;
        const isSkipped=!isDone&&savedExs[ex.id]?.skipped===true;
        const isBW=!!ex.bw;
        const customName=draftSwaps[ex.id]||ex.name;
        const extraSets=draftExtraSets[ex.id]||[];
        const prev=getBest(ex.id,isBW);
        const savedData=isDone?completedData?.exercises?.find(e=>e.id===ex.id):savedExs[ex.id];

        let tags='';
        if(ex.ramp)tags+=`<span class="ex-tag ramp">Ramping</span>`;
        if(ex.singel)tags+=`<span class="ex-tag singel">Singlar</span>`;
        if(isBW)tags+=`<span class="ex-tag bw">KV+</span>`;
        let prevText='';
        if(prev){
          if(isBW)prevText=`<div class="ex-prev">Bästa: <span>KV+${prev.extra||0}kg × ${prev.reps||'?'}r</span></div>`;
          else prevText=`<div class="ex-prev">Bästa: <span>${prev.weight}kg × ${prev.reps||'?'}r</span></div>`;
        }

        html+=`<div class="${'ex-block'+(isSkipped?' skipped':'')+(isSaved?' saved':'')}" id="exblock-${ex.id}">
          <div class="ex-header-row">
            <div class="ex-label-col">
              <div class="ex-name">${customName}${tags}</div>
              <div class="ex-detail">${ex.detail}</div>${prevText}
            </div>
            <div class="ex-action-col">`;

        if(!isDone&&!isSkipped){
          html+=`<div class="ex-mini-btns">
            ${isSaved
              ?`<span class="ex-saved-badge">✓</span><button class="ex-mini-btn" onclick="unsaveExercise('${pass.id}','${ex.id}')">Ändra</button>`
              :`<button class="ex-mini-btn save-btn" onclick="saveExercise('${pass.id}','${ex.id}')">Spara</button>
                <button class="ex-mini-btn" onclick="skipExercise('${pass.id}','${ex.id}')">Skippa</button>
                <button class="ex-mini-btn" onclick="toggleSwap('${ex.id}','${pass.id}')">Byt</button>`}
          </div>`;
        } else if(!isDone&&isSkipped){
          html+=`<div class="ex-mini-btns"><button class="ex-mini-btn" onclick="unskipExercise('${pass.id}','${ex.id}')">↩</button></div>`;
        }

        html+=`</div></div>`;

        if(!isDone){
          html+=`<select class="swap-select" id="swap-${ex.id}" style="display:none" onchange="doSwap('${ex.id}',this.value,'${pass.id}')">
            <option value="">— Välj övning —</option>
            ${ALL_EXERCISES.map(e=>`<option value="${e}"${e===customName?' selected':''}>${e}</option>`).join('')}
          </select>`;
        }

        if(!isSkipped){
          const totalSets=1+extraSets.length;
          html+=`<div class="sets-table">`;
          for(let si=0;si<totalSets;si++){
            const isExtra=si>0;const warmup=isExtra&&extraSets[si-1]?.warmup;
            const savedSet=savedData?.sets?.[si]||null;
            const dis=(isDone||isSaved)?'disabled':'';
            const wCls=warmup?' warmup':'';
            if(isBW){
              html+=`<div class="set-row bw-set">
                <span class="set-num${warmup?' warmup-label':''}">${warmup?'Uppv.':'Set '+(si+1)}</span>
                <div><div class="bw-snap">KV ${savedSet?.bwSnap||todayW||'?'}kg</div>
                  <input class="set-input${wCls}" type="number" id="bw-${ex.id}-${si}" placeholder="0" value="${savedSet?.extra!=null?savedSet.extra:''}" min="-50" step="1.25" ${dis}>
                  <div class="set-unit">+kg</div></div>
                <div><input class="set-input${wCls}" type="number" id="r-${ex.id}-${si}" placeholder="${prev?.reps||'—'}" value="${savedSet?.reps||''}" min="1" max="50" ${dis}>
                  <div class="set-unit">reps</div></div>
                <div><input class="set-input${wCls} forced" type="number" id="f-${ex.id}-${si}" placeholder="0" value="${savedSet?.forced||''}" min="0" max="20" ${dis}>
                  <div class="set-unit forced-unit">+forced</div></div>
                ${!isDone&&!isSaved&&isExtra?`<button class="set-delete" onclick="removeExtraSet('${ex.id}',${si-1},'${pass.id}')">✕</button>`:'<div></div>'}
              </div>`;
            } else {
              html+=`<div class="set-row normal-set">
                <span class="set-num${warmup?' warmup-label':''}">${warmup?'Uppv.':'Set '+(si+1)}</span>
                <div><input class="set-input${wCls}" type="number" id="w-${ex.id}-${si}" placeholder="${prev?.weight||'—'}" value="${savedSet?.weight||''}" min="0" step="2.5" ${dis}>
                  <div class="set-unit">kg</div></div>
                <div><input class="set-input${wCls}" type="number" id="r-${ex.id}-${si}" placeholder="${prev?.reps||'—'}" value="${savedSet?.reps||''}" min="1" max="50" ${dis}>
                  <div class="set-unit">reps</div></div>
                <div><input class="set-input${wCls} forced" type="number" id="f-${ex.id}-${si}" placeholder="0" value="${savedSet?.forced||''}" min="0" max="20" ${dis}>
                  <div class="set-unit forced-unit">+forced</div></div>
                ${!isDone&&!isSaved&&isExtra?`<button class="set-delete" onclick="removeExtraSet('${ex.id}',${si-1},'${pass.id}')">✕</button>`:'<div></div>'}
              </div>`;
            }
          }
          if(!isDone&&!isSaved){
            html+=`<button class="add-set-btn" onclick="addExtraSet('${ex.id}',false,'${pass.id}')">+ Arbetsset</button>`;
            if(ex.ramp||ex.singel)html+=`<button class="add-set-btn" style="border-color:#1a1400;color:#3a2a00" onclick="addExtraSet('${ex.id}',true,'${pass.id}')">+ Uppvärmningsset</button>`;
          }
          html+=`</div>`;
        }
        html+=`</div>`;
      });

      // Extras
      extras.forEach((ex,i)=>{
        html+=`<div class="ex-block${ex.saved?' saved':''}">
          <div class="ex-header-row">
            <div class="ex-label-col"><div class="ex-name">${ex.name} <span class="ex-tag" style="color:#446;border-color:#223">Extra</span></div></div>
            <div class="ex-action-col"><div class="ex-mini-btns">
              ${ex.saved?`<span class="ex-saved-badge">✓</span><button class="ex-mini-btn" onclick="unsaveExtra('${pass.id}',${i})">Ändra</button>`
                :`<button class="ex-mini-btn save-btn" onclick="saveExtra('${pass.id}',${i})">Spara</button>
                  <button class="ex-mini-btn" onclick="removeExtra('${pass.id}',${i})">Ta bort</button>`}
            </div></div>
          </div>
          <div class="sets-table">
            <div class="set-row normal-set">
              <span class="set-num">Set 1</span>
              <div><input class="set-input" type="number" id="ew-${pass.id}-${i}" placeholder="—" min="0" step="2.5" value="${ex.weight||''}" ${ex.saved?'disabled':''}><div class="set-unit">kg</div></div>
              <div><input class="set-input" type="number" id="er-${pass.id}-${i}" placeholder="—" min="1" max="50" value="${ex.reps||''}" ${ex.saved?'disabled':''}><div class="set-unit">reps</div></div>
              <div></div>
            </div>
          </div>
        </div>`;
      });

      if(!isDone){
        html+=`<div class="add-ex-row">
          <button class="add-ex-btn" id="addbtn-${pass.id}" onclick="showAddEx('${pass.id}')"><span style="font-size:.85rem">+</span> Lägg till övning</button>
          <div class="add-ex-form" id="addform-${pass.id}" style="display:none">
            <input class="add-ex-input" type="text" id="addinput-${pass.id}" placeholder="Ab Wheel, Dragon Flag..." list="exlist">
            <button class="add-ex-confirm" onclick="confirmAddEx('${pass.id}')">+</button>
          </div>
        </div>
        <datalist id="exlist">${ALL_EXERCISES.map(e=>`<option value="${e}">`).join('')}</datalist>`;
      }

      const savedCount=Object.values(savedExs).filter(e=>e&&!e.skipped).length+extras.filter(e=>e.saved).length;
      const skippedCount=Object.values(savedExs).filter(e=>e&&e.skipped).length;

      html+=`<div class="pass-actions">`;
      if(!isDone){
        html+=`<button class="btn-primary" onclick="finishPass('${pass.id}')" ${savedCount===0?'disabled':''}>Avsluta pass →</button>
               <button class="btn-secondary" onclick="undoPass('${pass.id}')">↩</button>`;
      } else {
        html+=`<button class="btn-secondary" onclick="undoPass('${pass.id}')">↩ Ångra</button>`;
      }
      html+=`</div>`;

      if(!isDone&&(savedCount>0||skippedCount>0)){
        html+=`<div class="draft-notice">☁ ${savedCount} sparad${savedCount!==1?'e':''} · syncat till molnet</div>`;
      }
    }
    html+=`</div></div>`;
  });

  html+=`</div>`;
  el.innerHTML=html;
}

// ══════ EXERCISE ACTIONS ═══════════════════════════════════════
function saveExercise(passId,exId){
  ensureDraft(passId);
  const pass=CHAIN.find(p=>p.id===passId);
  const ex=pass.exercises.find(e=>e.id===exId);
  const isBW=!!ex.bw;const todayW=getTodayWeight();
  const extraSets=state.draft.extraSets[exId]||[];
  const sets=[];
  for(let si=0;si<1+extraSets.length;si++){
    const warmup=si>0&&extraSets[si-1]?.warmup;
    if(isBW){
      const extra=parseFloat(document.getElementById('bw-'+exId+'-'+si)?.value);
      const reps=parseInt(document.getElementById('r-'+exId+'-'+si)?.value)||null;
      const forced=parseInt(document.getElementById('f-'+exId+'-'+si)?.value)||null;
      sets.push({extra:isNaN(extra)?0:extra,bwSnap:todayW||0,reps,forced,warmup});
    } else {
      const weight=parseFloat(document.getElementById('w-'+exId+'-'+si)?.value)||null;
      const reps=parseInt(document.getElementById('r-'+exId+'-'+si)?.value)||null;
      const forced=parseInt(document.getElementById('f-'+exId+'-'+si)?.value)||null;
      sets.push({weight,reps,forced,warmup});
    }
  }
  state.draft.savedExercises[exId]={id:exId,name:state.draft.swaps[exId]||ex.name,sets,bw:isBW};
  save();showToast('Sparad ✓');rerenderPass(passId);
}

function unsaveExercise(passId,exId){
  ensureDraft(passId);
  delete state.draft.savedExercises[exId];
  save();rerenderPass(passId);
}

function skipExercise(passId,exId){
  ensureDraft(passId);
  const pass=CHAIN.find(p=>p.id===passId);
  const ex=pass.exercises.find(e=>e.id===exId);
  state.draft.savedExercises[exId]={id:exId,name:state.draft.swaps[exId]||ex.name,skipped:true};
  save();rerenderPass(passId);
}

function unskipExercise(passId,exId){
  ensureDraft(passId);
  delete state.draft.savedExercises[exId];
  save();rerenderPass(passId);
}

function saveExtra(passId,idx){
  ensureDraft(passId);
  const w=parseFloat(document.getElementById('ew-'+passId+'-'+idx)?.value)||null;
  const r=parseInt(document.getElementById('er-'+passId+'-'+idx)?.value)||null;
  state.draft.extras[idx]={...state.draft.extras[idx],saved:true,weight:w,reps:r};
  save();showToast('Sparad ✓');rerenderPass(passId);
}

function unsaveExtra(passId,idx){
  ensureDraft(passId);
  state.draft.extras[idx].saved=false;
  save();rerenderPass(passId);
}

function finishPass(passId){
  const draft=state.draft;if(!draft||draft.passId!==passId)return;
  const pass=CHAIN.find(p=>p.id===passId);
  const exercises=[];
  pass.exercises.forEach(ex=>{const d=draft.savedExercises[ex.id];if(d)exercises.push(d);});
  draft.extras.forEach((ex,i)=>{if(ex.saved)exercises.push({id:'extra_'+i,name:ex.name,sets:[{weight:ex.weight,reps:ex.reps}],extra:true});});
  const today=new Date().toLocaleDateString('sv-SE',{month:'short',day:'numeric'});
  curCycle().done[passId]={date:today,exercises};
  state.log.push({passId,passName:pass.name,timestamp:Date.now(),exercises});
  state.draft=null;
  save();showToast('Pass '+passId+' avslutat! 💪');renderChain();
}

// ══════ SET MANAGEMENT ═════════════════════════════════════════
function addExtraSet(exId,warmup,passId){
  ensureDraft(passId);
  if(!state.draft.extraSets[exId])state.draft.extraSets[exId]=[];
  state.draft.extraSets[exId].push({warmup:!!warmup});
  save();rerenderPass(passId);
}
function removeExtraSet(exId,idx,passId){
  ensureDraft(passId);
  if(state.draft.extraSets[exId])state.draft.extraSets[exId].splice(idx,1);
  save();rerenderPass(passId);
}

// ══════ SWAP / ADD ═════════════════════════════════════════════
function toggleSwap(exId,passId){const s=document.getElementById('swap-'+exId);if(s)s.style.display=s.style.display==='none'?'block':'none';}
function doSwap(exId,val,passId){if(!val)return;ensureDraft(passId);state.draft.swaps[exId]=val;save();document.getElementById('swap-'+exId).style.display='none';rerenderPass(passId);}
function showAddEx(passId){document.getElementById('addbtn-'+passId).style.display='none';document.getElementById('addform-'+passId).style.display='flex';setTimeout(()=>document.getElementById('addinput-'+passId)?.focus(),50);}
function confirmAddEx(passId){const inp=document.getElementById('addinput-'+passId);const name=inp?.value.trim();if(!name)return;ensureDraft(passId);state.draft.extras.push({name,saved:false});save();rerenderPass(passId);}
function removeExtra(passId,idx){ensureDraft(passId);state.draft.extras.splice(idx,1);save();rerenderPass(passId);}

// ══════ PASS MANAGEMENT ════════════════════════════════════════
function doneRest(){const today=new Date().toLocaleDateString('sv-SE',{month:'short',day:'numeric'});curCycle().done['V']={date:today,exercises:[]};save();showToast('Vila inlagd ✓');renderChain();}
function undoPass(passId){
  curCycle().done[passId]=null;
  if(state.draft&&state.draft.passId===passId)state.draft=null;
  for(let i=state.log.length-1;i>=0;i--){if(state.log[i].passId===passId){state.log.splice(i,1);break;}}
  save();renderChain();
}
function doNewCycle(){state.cycles.push(newCycle());save();renderChain();}
function rerenderPass(passId){renderChain();setTimeout(()=>{const c=document.getElementById('card-'+passId);if(c)c.classList.add('open');},15);}
function toggleCard(id){document.getElementById('card-'+id)?.classList.toggle('open');}

// ══════ PR / BEST ══════════════════════════════════════════════
function getBest(exId,isBW){
  let best=null;
  for(const entry of state.log){
    const ex=entry.exercises?.find(e=>e.id===exId);
    if(!ex||ex.skipped)continue;
    for(const s of(ex.sets||[])){
      if(isBW){const t=(s.extra||0)+(s.bwSnap||0);if(!best||t>((best.extra||0)+(best.bwSnap||0)))best={...s};}
      else{if(s.weight&&(!best||s.weight>best.weight||(s.weight===best.weight&&(s.reps||0)>(best.reps||0))))best={...s};}
    }
  }
  return best;
}
function getAllPRs(){
  const prs={};const defs=CHAIN.flatMap(p=>p.exercises).map(e=>({id:e.id,name:e.name,bw:!!e.bw}));
  for(const entry of state.log){
    for(const ex of(entry.exercises||[])){
      if(ex.skipped||ex.extra)continue;
      const def=defs.find(d=>d.id===ex.id);const isBW=def?.bw;
      for(const s of(ex.sets||[])){
        if(isBW){const t=(s.extra||0)+(s.bwSnap||0);const cur=prs[ex.id];if(!cur||t>((cur.extra||0)+(cur.bwSnap||0)))prs[ex.id]={name:ex.name,extra:s.extra||0,bwSnap:s.bwSnap||0,reps:s.reps,bw:true};}
        else{if(!s.weight)continue;const cur=prs[ex.id];if(!cur||s.weight>cur.weight||(s.weight===cur.weight&&(s.reps||0)>(cur.reps||0)))prs[ex.id]={name:ex.name,weight:s.weight,reps:s.reps,bw:false};}
      }
    }
  }
  return Object.values(prs);
}

// ══════ PROGRESS ═══════════════════════════════════════════════
function renderProgress(){
  const el=document.getElementById('view-progress');
  if(!state.log.length){el.innerHTML=`<div class="section-title">Progress</div><div class="empty-state">Inga pass loggade än.</div>`;return;}
  const last=state.log[state.log.length-1];const days=Math.floor((Date.now()-last.timestamp)/86400000);
  let html=`<div class="section-title">Progress</div>
  <div class="stats-grid">
    <div class="stat-box"><div class="stat-num">${state.log.length}</div><div class="stat-desc">Pass loggade</div></div>
    <div class="stat-box"><div class="stat-num">${state.cycles.length}</div><div class="stat-desc">Rundor</div></div>
    <div class="stat-box"><div class="stat-num">${days}d</div><div class="stat-desc">Sedan senaste</div></div>
  </div>`;
  const prs=getAllPRs();
  if(prs.length){
    html+=`<div class="section-sub">★ Personbästa</div><div class="pr-grid">`;
    prs.forEach(pr=>{
      const val=pr.bw?`KV+${pr.extra}kg`:`${pr.weight}kg`;
      const sub=pr.bw?`KV ${pr.bwSnap}kg · ${pr.reps||'?'}r`:`${pr.reps||'?'} reps`;
      html+=`<div class="pr-card"><div class="pr-ex-name">${pr.name}</div><div class="pr-value">${val}</div><div class="pr-sub">${sub}</div></div>`;
    });
    html+=`</div>`;
  }
  html+=`<div class="section-sub">Historik</div>`;
  [...state.log].reverse().forEach((entry,i)=>{
    const idx=state.log.length-1-i;
    const cnt=(entry.exercises||[]).filter(e=>!e.skipped&&!e.extra).length;
    html+=`<div class="hist-entry" id="h${idx}">
      <div class="hist-header" onclick="document.getElementById('h${idx}').classList.toggle('open')">
        <div><div class="hist-date">${fmtDate(entry.timestamp)}</div><div class="hist-pass">Pass ${entry.passId} — ${entry.passName}</div></div>
        <div style="font-family:var(--mono);font-size:.5rem;color:#2a2a2a">${cnt} övn</div>
      </div>
      <div class="hist-body">
        ${!(entry.exercises||[]).length?'<div class="hist-ex"><div class="hist-ex-header"><span>Vilodag</span></div></div>'
          :(entry.exercises||[]).map(ex=>{
            if(ex.skipped)return`<div class="hist-ex"><div class="hist-ex-header"><strong>${ex.name}</strong><span style="color:#2a2a2a">Skippad</span></div></div>`;
            const sh=(ex.sets||[]).map((s,si)=>ex.bw
              ?`<div class="hist-set">${s.warmup?'Uppv.':'Set '+(si+1)}: KV(${s.bwSnap||0})+${s.extra||0}kg × ${s.reps||'?'}r${s.forced?` +${s.forced}f`:''}</div>`
              :`<div class="hist-set">${s.warmup?'Uppv.':'Set '+(si+1)}: ${s.weight||'—'}kg × ${s.reps||'?'}r${s.forced?` +${s.forced}f`:''}</div>`).join('');
            return`<div class="hist-ex"><div class="hist-ex-header"><strong>${ex.name}${ex.extra?' +':''}</strong><span>${(ex.sets||[]).length} set</span></div>${sh}</div>`;
          }).join('')}
      </div></div>`;
  });
  el.innerHTML=html;
}

// ══════ WEIGHT VIEW ════════════════════════════════════════════
function renderWeight(){
  const el=document.getElementById('view-weight');
  if(!state.weightLog.length){el.innerHTML=`<div class="section-title">Viktkurva</div><div class="empty-state">Ingen vikt loggad ännu.</div>`;return;}
  const sorted=[...state.weightLog].sort((a,b)=>a.date.localeCompare(b.date));
  const latest=sorted[sorted.length-1];const first=sorted[0];
  const diff=(latest.weight-first.weight).toFixed(1);
  let html=`<div class="section-title">Viktkurva</div>
  <div class="stats-grid">
    <div class="stat-box"><div class="stat-num">${latest.weight}</div><div class="stat-desc">Senaste kg</div></div>
    <div class="stat-box"><div class="stat-num">${diff>0?'+':''}${diff}</div><div class="stat-desc">Förändring</div></div>
    <div class="stat-box"><div class="stat-num">${sorted.length}</div><div class="stat-desc">Mätningar</div></div>
  </div>
  <div class="weight-chart-wrap"><canvas id="weightChart" height="190"></canvas></div>
  <div class="section-sub">Logg</div><div class="wlog-list">`;
  [...sorted].reverse().forEach(e=>{html+=`<div class="wlog-row"><span>${e.date}</span><strong>${e.weight} kg</strong><button class="wlog-delete" onclick="deleteWeight('${e.date}')">✕</button></div>`;});
  html+=`</div>`;el.innerHTML=html;drawChart(sorted);
}
function drawChart(data){
  const c=document.getElementById('weightChart');if(!c)return;
  const ctx=c.getContext('2d');const W=c.offsetWidth||320;const H=190;c.width=W;c.height=H;
  const ws=data.map(d=>d.weight);const labels=data.map(d=>d.date.slice(5));
  const mn=Math.min(...ws)-1;const mx=Math.max(...ws)+1;
  const p={t:16,r:12,b:32,l:36};const cw=W-p.l-p.r;const ch=H-p.t-p.b;
  ctx.clearRect(0,0,W,H);
  ctx.strokeStyle='#1a1a1a';ctx.lineWidth=1;
  for(let i=0;i<=4;i++){const y=p.t+ch*(i/4);ctx.beginPath();ctx.moveTo(p.l,y);ctx.lineTo(p.l+cw,y);ctx.stroke();ctx.fillStyle='#333';ctx.font='9px DM Mono,monospace';ctx.textAlign='right';ctx.fillText((mx-(mx-mn)*(i/4)).toFixed(1),p.l-3,y+3);}
  if(data.length<2){ctx.beginPath();ctx.arc(p.l+cw/2,p.t+ch/2,3,0,Math.PI*2);ctx.fillStyle='#c0392b';ctx.fill();return;}
  const pts=data.map((d,i)=>({x:p.l+cw*(i/(data.length-1)),y:p.t+ch*(1-(d.weight-mn)/(mx-mn))}));
  ctx.beginPath();ctx.moveTo(pts[0].x,p.t+ch);pts.forEach(pt=>ctx.lineTo(pt.x,pt.y));ctx.lineTo(pts[pts.length-1].x,p.t+ch);ctx.closePath();
  const g=ctx.createLinearGradient(0,p.t,0,p.t+ch);g.addColorStop(0,'rgba(192,57,43,.2)');g.addColorStop(1,'rgba(192,57,43,0)');ctx.fillStyle=g;ctx.fill();
  ctx.beginPath();pts.forEach((pt,i)=>i===0?ctx.moveTo(pt.x,pt.y):ctx.lineTo(pt.x,pt.y));ctx.strokeStyle='#c0392b';ctx.lineWidth=2;ctx.stroke();
  pts.forEach((pt,i)=>{ctx.beginPath();ctx.arc(pt.x,pt.y,2.5,0,Math.PI*2);ctx.fillStyle='#c0392b';ctx.fill();if(data.length<=8||i%(Math.ceil(data.length/6))===0){ctx.fillStyle='#333';ctx.font='9px DM Mono,monospace';ctx.textAlign='center';ctx.fillText(labels[i],pt.x,H-p.b+12);}});
}
function deleteWeight(date){state.weightLog=state.weightLog.filter(e=>e.date!==date);save();renderWeight();}

// ══════ DATA VIEW ══════════════════════════════════════════════
function renderData(){
  const el=document.getElementById('view-data');
  const size=(JSON.stringify(state).length/1024).toFixed(1);
  el.innerHTML=`
  <div class="section-title">Data</div>
  <div style="font-family:var(--mono);font-size:.6rem;color:#444;margin-bottom:20px">Supabase · ${size} KB · ${state.log.length} pass · ${state.weightLog.length} vikter</div>
  <div class="section-sub">Säkerhetskopia</div>
  <div style="font-family:var(--mono);font-size:.6rem;color:var(--gray-light);line-height:1.8;margin-bottom:10px">Exportera all data som JSON. Importera för att återställa.</div>
  <div class="data-row">
    <button class="data-btn" onclick="exportData()">↓ Exportera JSON</button>
    <button class="data-btn" onclick="document.getElementById('importFile').click()">↑ Importera JSON</button>
  </div>
  <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(event)">
  <div class="section-sub" style="margin-top:28px">Rensa</div>
  <div class="data-row">
    <button class="data-btn danger" onclick="resetAll()">✕ Nollställ allt</button>
  </div>`;
}
function exportData(){
  const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download='mentzer30-'+todayStr()+'.json';a.click();showToast('Export klar!');
}
function importData(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const d=JSON.parse(ev.target.result);
      if(!d.cycles||!d.log)throw new Error('Ogiltig fil');
      state=d;save();showToast('Data importerad!');renderChain();
    }catch{showToast('Fel: ogiltig fil');}
  };
  reader.readAsText(file);
}
function resetAll(){
  if(!confirm('Nollställ ALL data? Går inte att ångra.'))return;
  state={cycles:[newCycle()],log:[],weightLog:[],draft:null};
  save();showToast('Nollställd');renderChain();
}

// ══════ UTILS ══════════════════════════════════════════════════
function fmtDate(ts){return new Date(ts).toLocaleDateString('sv-SE',{weekday:'short',month:'short',day:'numeric'});}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2400);}

// ══════ INIT ═══════════════════════════════════════════════════
(async()=>{
  document.getElementById('view-chain').innerHTML=`<div class="loading-screen"><div class="spinner"></div><div class="loading-title">MENTZER 3.0</div><div class="loading-sub">Laddar från molnet...</div></div>`;
  await loadState();
  renderChain();
})();
</script>
